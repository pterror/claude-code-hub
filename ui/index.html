<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="description" content="Multi-agent Claude Code orchestration hub. Spawn agents, track status, communicate between agents.">
  <meta property="og:title" content="claude-code-hub">
  <meta property="og:description" content="Multi-agent Claude Code orchestration. Spawn agents to different repos, track from your phone.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="manifest" href="/manifest.json">
  <script src="/marked.min.js"></script>
  <title>claude-code-hub</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #e8e8ed;
      --fg-muted: #888892;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --primary: rgba(59, 130, 246, 0.8);
      --primary-hover: rgba(59, 130, 246, 0.9);
      --success: rgba(34, 197, 94, 0.8);
      --error: rgba(239, 68, 68, 0.8);
      --warning: rgba(234, 179, 8, 0.8);
      --info: rgba(59, 130, 246, 0.7);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --fg: #1a1a1f;
        --fg-muted: #666670;
        --glass-bg: rgba(0, 0, 0, 0.03);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-hover: rgba(0, 0, 0, 0.06);
        --primary: rgba(37, 99, 235, 0.85);
        --primary-hover: rgba(37, 99, 235, 0.95);
        --success: rgba(22, 163, 74, 0.85);
        --error: rgba(220, 38, 38, 0.85);
        --warning: rgba(202, 138, 4, 0.85);
        --info: rgba(37, 99, 235, 0.75);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 500;
    }

    /* Main layout */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .agents {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Main content area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .session-tabs {
      display: flex;
      gap: 0.25rem;
      padding: 0.5rem;
      border-bottom: 1px solid var(--glass-border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .session-tab {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .session-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .session-tab .close-tab {
      opacity: 0.6;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .session-tab .close-tab:hover {
      opacity: 1;
    }

    .session-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .session-view.active {
      display: flex;
    }

    .session-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .session-input {
      padding: 0.75rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 0.5rem;
    }

    .session-input input {
      flex: 1;
    }

    .no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg-muted);
    }

    /* Mobile: stack layout */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        min-width: 100%;
        max-height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--glass-border);
      }
      .sidebar.collapsed {
        max-height: 48px;
        overflow: hidden;
      }
    }

    /* Message styling in session view */
    .message {
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .message-user {
      background: var(--primary);
      color: white;
      margin-left: 2rem;
    }

    .message-queued {
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      color: var(--fg-muted);
      margin-left: 2rem;
      cursor: pointer;
      position: relative;
    }

    .message-queued:hover {
      background: var(--glass-hover);
    }

    .message-queued::before {
      content: '⏳ Queued';
      font-size: 0.65rem;
      opacity: 0.7;
      display: block;
      margin-bottom: 0.25rem;
    }

    .message-queued:hover::after {
      content: '(click to edit)';
      font-size: 0.65rem;
      opacity: 0.7;
      margin-left: 0.5rem;
    }

    .message-sending {
      background: var(--primary);
      color: white;
      margin-left: 2rem;
      opacity: 0.7;
    }

    .message-sending::before {
      content: '⏳ Sending...';
      font-size: 0.65rem;
      opacity: 0.7;
      display: block;
      margin-bottom: 0.25rem;
    }

    .message-assistant {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
    }

    /* Markdown styling */
    .message-assistant p {
      margin: 0 0 0.5rem 0;
    }
    .message-assistant p:last-child {
      margin-bottom: 0;
    }
    .message-assistant h1, .message-assistant h2, .message-assistant h3 {
      margin: 0.75rem 0 0.5rem 0;
      font-weight: 600;
    }
    .message-assistant h1 { font-size: 1.1rem; }
    .message-assistant h2 { font-size: 1rem; }
    .message-assistant h3 { font-size: 0.9rem; }
    .message-assistant code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }
    .message-assistant pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .message-assistant pre code {
      background: none;
      padding: 0;
    }
    .message-assistant ul, .message-assistant ol {
      margin: 0.5rem 0;
      padding-left: 1.5rem;
    }
    .message-assistant li {
      margin: 0.25rem 0;
    }
    .message-assistant blockquote {
      border-left: 3px solid var(--fg-muted);
      margin: 0.5rem 0;
      padding-left: 0.75rem;
      color: var(--fg-muted);
    }
    .message-assistant a {
      color: var(--primary);
    }
    .message-assistant table {
      border-collapse: collapse;
      margin: 0.5rem 0;
      font-size: 0.8rem;
    }
    .message-assistant th, .message-assistant td {
      border: 1px solid var(--glass-border);
      padding: 0.25rem 0.5rem;
    }
    .message-assistant th {
      background: rgba(0, 0, 0, 0.2);
    }

    .message-tool {
      background: var(--glass-bg);
      border-left: 3px solid var(--info);
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }

    /* Tool type colors */
    .tool-read { border-left-color: #10b981; }
    .tool-write, .tool-edit { border-left-color: #f59e0b; }
    .tool-bash { border-left-color: #8b5cf6; }
    .tool-grep, .tool-glob { border-left-color: #06b6d4; }
    .tool-web { border-left-color: #ec4899; }
    .tool-task { border-left-color: #6366f1; }

    .tool-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 0.25rem 0;
    }

    .tool-name {
      font-weight: 500;
      color: var(--fg);
    }

    .tool-meta {
      font-size: 0.7rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
    }

    .tool-toggle {
      font-size: 0.7rem;
      color: var(--fg-muted);
    }

    .tool-content {
      margin-top: 0.5rem;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.75rem;
    }

    .tool-content.collapsed {
      display: none;
    }

    /* File viewer (Read) */
    .file-viewer {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .file-viewer-header {
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--glass-border);
    }

    .file-viewer-content {
      padding: 0.5rem;
      white-space: pre;
      overflow-x: auto;
      font-family: ui-monospace, monospace;
      line-height: 1.4;
    }

    .line-number {
      display: inline-block;
      width: 3em;
      color: var(--fg-muted);
      text-align: right;
      margin-right: 1em;
      user-select: none;
      opacity: 0.5;
    }

    /* Terminal (Bash) */
    .terminal {
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.4rem 0.6rem;
      background: #16162a;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: #888;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .terminal-prompt {
      color: #10b981;
    }

    .terminal-cmd {
      color: #e8e8ed;
    }

    .terminal-output {
      padding: 0.5rem;
      color: #ccc;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }

    .terminal-error {
      color: #f87171;
    }

    /* Edit diff */
    .diff-view {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .diff-header {
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-muted);
    }

    .diff-old {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      padding: 0.25rem 0.5rem;
      border-left: 2px solid #ef4444;
    }

    .diff-new {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      padding: 0.25rem 0.5rem;
      border-left: 2px solid #22c55e;
    }

    .diff-content {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
    }

    /* File list (Glob/Grep) */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .file-list-item {
      padding: 0.25rem 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-muted);
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2px;
    }

    .file-list-item:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    /* Search results (Grep) */
    .grep-match {
      padding: 0.25rem 0.5rem;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2px;
      margin-bottom: 0.25rem;
    }

    .grep-file {
      font-size: 0.7rem;
      color: #06b6d4;
      margin-bottom: 0.125rem;
    }

    .grep-line {
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
    }

    .grep-line-num {
      color: var(--fg-muted);
      margin-right: 0.5rem;
    }

    /* Web fetch */
    .web-result {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .web-url {
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: #ec4899;
      word-break: break-all;
    }

    .web-content {
      padding: 0.5rem;
      font-size: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Task/Agent */
    .task-info {
      background: rgba(99, 102, 241, 0.1);
      border-radius: 4px;
      padding: 0.5rem;
    }

    .task-type {
      font-size: 0.7rem;
      color: #6366f1;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .task-prompt {
      font-size: 0.8rem;
    }

    /* Sidebar agent cards - more compact */
    .agent {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .agent.selected {
      border-color: var(--primary);
      background: var(--glass-hover);
    }

    .agent:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    @media (prefers-color-scheme: light) {
      .agent:hover {
        border-color: rgba(0, 0, 0, 0.1);
      }
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .agent-cwd {
      font-size: 0.875rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-badges {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge-status {
      color: white;
    }

    .status-running { background: var(--info); }
    .status-done { background: var(--success); }
    .status-error { background: var(--error); }
    .status-waiting { background: var(--warning); }

    .ws-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      vertical-align: middle;
      margin-left: 4px;
    }
    .ws-connected { background: var(--success); }
    .ws-disconnected { background: var(--error); }

    .badge-caps {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .caps-select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .caps-select:hover {
      border-color: var(--primary);
    }

    .caps-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .agent-prompt {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .agent-toggle {
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-top: 0.5rem;
      opacity: 0.7;
    }

    .agent.expanded .agent-toggle::after { content: "▲ collapse"; }
    .agent:not(.expanded) .agent-toggle::after { content: "▼ expand"; }

    .agent-messages {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
      font-size: 0.8rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .agent.expanded .agent-messages { display: block; }

    .spawn-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 1rem;
      border-radius: 12px;
    }

    input, select {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--fg);
      font-size: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    input::placeholder {
      color: var(--fg-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    select {
      cursor: pointer;
    }

    button {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .empty {
      color: var(--fg-muted);
      text-align: center;
      padding: 3rem 1rem;
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
    }

    .pull-indicator {
      text-align: center;
      padding: 0.5rem;
      color: var(--fg-muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pull-indicator.visible { opacity: 1; }

    .presets {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .preset-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .preset-btn:hover {
      background: var(--glass-hover);
    }
    .preset-btn.add {
      border-style: dashed;
      color: var(--fg-muted);
    }

    .agent-cost {
      font-size: 0.7rem;
      color: var(--fg-muted);
      margin-left: 0.5rem;
    }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .filter-input {
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 0.25rem;
    }

    .tab {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .tab:hover {
      background: var(--glass-hover);
      color: var(--fg);
    }

    .tab.active {
      background: var(--primary);
      color: white;
    }

    .badge-source {
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      color: var(--fg-muted);
      font-style: italic;
    }

    .shortcuts {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--fg-muted);
      opacity: 0.6;
    }
    .shortcuts kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      margin-right: 0.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .header h1 {
      margin-bottom: 0;
    }

    .notify-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .notify-btn.enabled {
      background: var(--success);
      color: white;
      border-color: transparent;
    }

  </style>
</head>
<body>
  <div class="pull-indicator" id="pull-indicator">Pull to refresh...</div>

  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>hub <span id="ws-status" class="ws-indicator ws-disconnected" title="Disconnected"></span></h1>
        <button class="notify-btn" id="notify-btn" title="Enable push notifications">🔔</button>
      </div>

      <div class="sidebar-content">
        <!-- Spawn form -->
        <form class="spawn-form" id="spawn-form" style="margin-bottom: 0.75rem;">
          <input type="text" id="cwd" placeholder="~/git/project" list="repos-list" required style="font-size: 0.85rem; padding: 0.5rem;">
          <datalist id="repos-list"></datalist>
          <input type="text" id="prompt" placeholder="What should the agent do?" required style="font-size: 0.85rem; padding: 0.5rem;">
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <select id="preset" style="flex: 1; font-size: 0.8rem; padding: 0.4rem;">
              <option value="isolated">isolated</option>
              <option value="observer">observer</option>
              <option value="peer">peer</option>
              <option value="coordinator">coordinator</option>
            </select>
            <button type="submit" style="font-size: 0.8rem; padding: 0.4rem 0.75rem;">Spawn</button>
          </div>
        </form>

        <!-- Filter and tabs -->
        <div class="filter-row" style="margin-bottom: 0.5rem;">
          <input type="text" class="filter-input" id="filter" placeholder="Filter..." style="font-size: 0.85rem; padding: 0.5rem;">
        </div>
        <div class="tabs" id="source-tabs" style="margin-bottom: 0.75rem;">
          <button class="tab active" data-source="all">All</button>
          <button class="tab" data-source="hub">Hub</button>
          <button class="tab" data-source="running">Running</button>
          <button class="tab" data-source="done">Done</button>
        </div>

        <!-- Agent list -->
        <div class="agents" id="agents">
          <div class="empty" style="padding: 1rem; text-align: center; font-size: 0.85rem;">No sessions</div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <div class="session-tabs" id="session-tabs"></div>

      <div id="session-views">
        <div class="no-session" id="no-session">
          <div style="text-align: center;">
            <div style="font-size: 1.25rem; margin-bottom: 0.5rem;">Select a session</div>
            <div style="font-size: 0.85rem;">Click a session in the sidebar to view it</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let agents = [];
    let filterText = '';
    let sourceFilter = 'all';
    let statusFilter = null;
    const agentElements = new Map();
    let hasMore = false;
    let loading = false;
    let currentOffset = 0;
    const PAGE_SIZE = 50;

    // Open session tabs
    const openTabs = new Map(); // id -> { agent, element, viewElement }
    let activeTabId = null;

    // Message queues per session
    // Each queue entry: { id: string, message: string, status: 'queued'|'sending' }
    const messageQueues = new Map(); // agentId -> Array<{id, message, status}>
    const processingQueue = new Set(); // agentIds currently being processed

    // Load default isolation preset
    const defaultPreset = localStorage.getItem('hub-default-preset') || 'isolated';
    document.getElementById('preset').value = defaultPreset;

    // Tool type detection
    function getToolType(toolName) {
      if (!toolName) return 'unknown';
      const name = toolName.toLowerCase();
      if (name === 'read') return 'read';
      if (name === 'write') return 'write';
      if (name === 'edit') return 'edit';
      if (name === 'bash') return 'bash';
      if (name === 'glob') return 'glob';
      if (name === 'grep') return 'grep';
      if (name.includes('web') || name.includes('fetch')) return 'web';
      if (name === 'task') return 'task';
      if (name === 'todowrite') return 'todo';
      return 'unknown';
    }

    function getToolClass(toolType) {
      const classes = {
        read: 'tool-read',
        write: 'tool-write',
        edit: 'tool-write',
        bash: 'tool-bash',
        glob: 'tool-grep',
        grep: 'tool-grep',
        web: 'tool-web',
        task: 'tool-task',
      };
      return classes[toolType] || '';
    }

    // Dedicated tool renderers
    function renderReadTool(input, result) {
      const filePath = input?.file_path || 'unknown';
      const fileName = filePath.split('/').pop();
      const content = result || '';

      return `
        <div class="file-viewer">
          <div class="file-viewer-header">${escapeHtml(filePath)}</div>
          <div class="file-viewer-content">${escapeHtml(content.slice(0, 5000))}${content.length > 5000 ? '\n...(truncated)' : ''}</div>
        </div>`;
    }

    function renderEditTool(input, result) {
      const filePath = input?.file_path || 'unknown';
      const oldStr = input?.old_string || '';
      const newStr = input?.new_string || '';

      return `
        <div class="diff-view">
          <div class="diff-header">${escapeHtml(filePath)}</div>
          <div class="diff-old diff-content">- ${escapeHtml(oldStr)}</div>
          <div class="diff-new diff-content">+ ${escapeHtml(newStr)}</div>
        </div>`;
    }

    function renderWriteTool(input, result) {
      const filePath = input?.file_path || 'unknown';
      const content = input?.content || '';

      return `
        <div class="file-viewer">
          <div class="file-viewer-header">Writing: ${escapeHtml(filePath)}</div>
          <div class="file-viewer-content">${escapeHtml(content.slice(0, 3000))}${content.length > 3000 ? '\n...(truncated)' : ''}</div>
        </div>`;
    }

    function renderBashTool(input, result) {
      const cmd = input?.command || '';
      const desc = input?.description || '';
      const output = result || '';
      const isError = output.includes('error:') || output.includes('Error:');

      return `
        <div class="terminal">
          <div class="terminal-header">
            <span class="terminal-prompt">$</span>
            <span class="terminal-cmd">${escapeHtml(cmd)}</span>
          </div>
          <div class="terminal-output ${isError ? 'terminal-error' : ''}">${escapeHtml(output.slice(0, 3000))}${output.length > 3000 ? '\n...(truncated)' : ''}</div>
        </div>`;
    }

    function renderGlobTool(input, result) {
      const pattern = input?.pattern || '';
      const path = input?.path || '';
      const files = (result || '').split('\n').filter(f => f.trim());

      if (files.length === 0) {
        return `<div class="tool-meta">Pattern: ${escapeHtml(pattern)} ${path ? `in ${escapeHtml(path)}` : ''}</div><div class="file-list"><div class="file-list-item">(no matches)</div></div>`;
      }

      const shown = files.slice(0, 50);
      return `
        <div class="tool-meta">Pattern: ${escapeHtml(pattern)} ${path ? `in ${escapeHtml(path)}` : ''} (${files.length} files)</div>
        <div class="file-list">
          ${shown.map(f => `<div class="file-list-item">${escapeHtml(f)}</div>`).join('')}
          ${files.length > 50 ? `<div class="file-list-item" style="color: var(--fg-muted);">...and ${files.length - 50} more</div>` : ''}
        </div>`;
    }

    function renderGrepTool(input, result) {
      const pattern = input?.pattern || '';
      const content = result || '';

      // Try to parse grep output (file:line:content format)
      const lines = content.split('\n').filter(l => l.trim()).slice(0, 30);

      return `
        <div class="tool-meta">Pattern: ${escapeHtml(pattern)}</div>
        <div class="file-list">
          ${lines.map(l => `<div class="grep-line">${escapeHtml(l)}</div>`).join('')}
          ${content.split('\n').length > 30 ? `<div style="color: var(--fg-muted);">...(more results)</div>` : ''}
        </div>`;
    }

    function renderWebTool(input, result) {
      const url = input?.url || '';
      const prompt = input?.prompt || '';
      const content = result || '';

      return `
        <div class="web-result">
          <div class="web-url">${escapeHtml(url)}</div>
          <div class="web-content">${escapeHtml(content.slice(0, 1500))}${content.length > 1500 ? '...' : ''}</div>
        </div>`;
    }

    function renderTaskTool(input, result) {
      const subagentType = input?.subagent_type || 'unknown';
      const prompt = input?.prompt || '';
      const taskResult = result || '';

      return `
        <div class="task-info">
          <div class="task-type">${escapeHtml(subagentType)} agent</div>
          <div class="task-prompt">${escapeHtml(prompt.slice(0, 200))}${prompt.length > 200 ? '...' : ''}</div>
          ${taskResult ? `<div style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--fg-muted);">${escapeHtml(taskResult.slice(0, 500))}</div>` : ''}
        </div>`;
    }

    function renderGenericTool(toolName, input, result) {
      const details = input ? JSON.stringify(input, null, 2) : '';
      const resultStr = result ? (typeof result === 'string' ? result : JSON.stringify(result, null, 2)) : '';

      return `
        <div style="font-size: 0.75rem;">
          ${details ? `<div><strong>Input:</strong><pre style="margin: 0.25rem 0;">${escapeHtml(details)}</pre></div>` : ''}
          ${resultStr ? `<div><strong>Result:</strong><pre style="margin: 0.25rem 0;">${escapeHtml(resultStr.slice(0, 2000))}${resultStr.length > 2000 ? '...' : ''}</pre></div>` : ''}
        </div>`;
    }

    // Format messages for display with dedicated tool UIs
    function formatMessages(messages) {
      if (!messages || messages.length === 0) return '<div class="empty">No messages yet</div>';

      return messages.map((m, i) => {
        if (m.type === 'tool') {
          const toolName = m.content.replace('Tool: ', '');
          const toolType = getToolType(toolName);
          const toolClass = getToolClass(toolType);

          let toolContent;
          switch (toolType) {
            case 'read':
              toolContent = renderReadTool(m.input, m.result);
              break;
            case 'edit':
              toolContent = renderEditTool(m.input, m.result);
              break;
            case 'write':
              toolContent = renderWriteTool(m.input, m.result);
              break;
            case 'bash':
              toolContent = renderBashTool(m.input, m.result);
              break;
            case 'glob':
              toolContent = renderGlobTool(m.input, m.result);
              break;
            case 'grep':
              toolContent = renderGrepTool(m.input, m.result);
              break;
            case 'web':
              toolContent = renderWebTool(m.input, m.result);
              break;
            case 'task':
              toolContent = renderTaskTool(m.input, m.result);
              break;
            default:
              toolContent = renderGenericTool(toolName, m.input, m.result);
          }

          return `<div class="message message-tool ${toolClass}" data-idx="${i}">
            <div class="tool-header">
              <span class="tool-name">${escapeHtml(toolName)}</span>
              <span class="tool-toggle">▲</span>
            </div>
            <div class="tool-content">${toolContent}</div>
          </div>`;
        } else if (m.content.startsWith('[User]:')) {
          return `<div class="message message-user">${escapeHtml(m.content.slice(7).trim())}</div>`;
        } else {
          // Render markdown for assistant messages
          const html = typeof marked !== 'undefined' ? marked.parse(m.content) : escapeHtml(m.content);
          return `<div class="message message-assistant">${html}</div>`;
        }
      }).join('');
    }

    // Open a session in a tab
    function openSessionTab(agent) {
      if (openTabs.has(agent.id)) {
        // Already open, just activate
        activateTab(agent.id);
        return;
      }

      // Create tab
      const tab = document.createElement('div');
      tab.className = 'session-tab';
      tab.dataset.id = agent.id;
      tab.innerHTML = `
        <span class="tab-label">${escapeHtml(agent.cwd.split('/').pop() || agent.cwd)}</span>
        <span class="close-tab">×</span>
      `;
      document.getElementById('session-tabs').appendChild(tab);

      // Create session view
      const view = document.createElement('div');
      view.className = 'session-view';
      view.dataset.id = agent.id;
      view.innerHTML = `
        <div class="session-messages" id="messages-${agent.id}">
          ${formatMessages(agent.messages)}
        </div>
        <div class="session-input">
          <input type="text" placeholder="Send a message..." id="input-${agent.id}">
          <button type="button" onclick="sendMessage('${agent.id}')">Send</button>
        </div>
      `;
      document.getElementById('session-views').appendChild(view);

      // Add enter key handler
      view.querySelector('input').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage(agent.id);
      });

      openTabs.set(agent.id, { agent, element: tab, viewElement: view });
      activateTab(agent.id);

      // Lazy load messages if needed
      if (!agent.messages || agent.messages.length === 0) {
        loadSessionMessages(agent.id);
      }
    }

    async function loadSessionMessages(id) {
      const messagesEl = document.getElementById(`messages-${id}`);
      if (!messagesEl) return;

      messagesEl.innerHTML = '<div class="empty">Loading...</div>';
      try {
        const res = await fetch(`${API}/agents/${id}`);
        if (res.ok) {
          const data = await res.json();
          const agent = agents.find(a => a.id === id);
          if (agent) {
            agent.messages = data.messages || [];
          }
          const tab = openTabs.get(id);
          if (tab) {
            tab.agent.messages = data.messages || [];
          }
          messagesEl.innerHTML = formatMessages(data.messages);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      } catch {
        messagesEl.innerHTML = '<div class="empty">Failed to load messages</div>';
      }
    }

    function activateTab(id) {
      // Deactivate current
      if (activeTabId && openTabs.has(activeTabId)) {
        openTabs.get(activeTabId).element.classList.remove('active');
        openTabs.get(activeTabId).viewElement.classList.remove('active');
      }

      // Hide no-session message
      document.getElementById('no-session').style.display = 'none';

      // Activate new
      activeTabId = id;
      const tab = openTabs.get(id);
      if (tab) {
        tab.element.classList.add('active');
        tab.viewElement.classList.add('active');

        // Update sidebar selection
        agentElements.forEach((el, agentId) => {
          el.classList.toggle('selected', agentId === id);
        });
      }
    }

    function closeTab(id) {
      const tab = openTabs.get(id);
      if (!tab) return;

      tab.element.remove();
      tab.viewElement.remove();
      openTabs.delete(id);

      // Clear sidebar selection
      const sidebarEl = agentElements.get(id);
      if (sidebarEl) sidebarEl.classList.remove('selected');

      // Activate another tab or show no-session
      if (activeTabId === id) {
        activeTabId = null;
        const remaining = Array.from(openTabs.keys());
        if (remaining.length > 0) {
          activateTab(remaining[remaining.length - 1]);
        } else {
          document.getElementById('no-session').style.display = 'flex';
        }
      }
    }

    // Send message to session
    function generateQueueId() {
      return 'q-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    async function sendMessage(agentId) {
      const input = document.getElementById(`input-${agentId}`);
      const message = input.value.trim();
      if (!message) return;

      input.value = '';

      // Add to queue
      if (!messageQueues.has(agentId)) messageQueues.set(agentId, []);
      const queueEntry = { id: generateQueueId(), message, status: 'queued' };
      messageQueues.get(agentId).push(queueEntry);

      // Render queued message
      renderQueuedMessage(agentId, queueEntry);

      // Process queue
      processQueue(agentId);
    }

    function renderQueuedMessage(agentId, entry) {
      const messagesEl = document.getElementById(`messages-${agentId}`);
      if (!messagesEl) return;

      const div = document.createElement('div');
      div.className = `message message-${entry.status}`;
      div.id = `queue-${entry.id}`;
      div.dataset.queueId = entry.id;
      div.dataset.agentId = agentId;
      div.innerHTML = escapeHtml(entry.message);

      if (entry.status === 'queued') {
        div.onclick = () => unqueueMessage(agentId, entry.id);
      }

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function unqueueMessage(agentId, queueId) {
      const queue = messageQueues.get(agentId);
      if (!queue) return;

      const idx = queue.findIndex(e => e.id === queueId);
      if (idx === -1) return;

      const entry = queue[idx];
      if (entry.status !== 'queued') return; // Can only unqueue if not yet sending

      // Remove from queue
      queue.splice(idx, 1);

      // Remove from UI
      const el = document.getElementById(`queue-${queueId}`);
      if (el) el.remove();

      // Put back in input
      const input = document.getElementById(`input-${agentId}`);
      if (input) {
        input.value = entry.message;
        input.focus();
      }
    }

    async function processQueue(agentId) {
      // Prevent concurrent processing for same agent
      if (processingQueue.has(agentId)) return;

      const queue = messageQueues.get(agentId);
      if (!queue || queue.length === 0) return;

      // Find first queued item
      const entry = queue.find(e => e.status === 'queued');
      if (!entry) return;

      processingQueue.add(agentId);
      entry.status = 'sending';

      // Update UI to show sending
      const el = document.getElementById(`queue-${entry.id}`);
      if (el) {
        el.className = 'message message-sending';
        el.onclick = null;
      }

      try {
        await fetch(`${API}/agents/${agentId}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: entry.message }),
        });

        // Mark as sent, update UI
        if (el) {
          el.className = 'message message-user';
          el.removeAttribute('id');
        }

        // Remove from queue
        const idx = queue.indexOf(entry);
        if (idx !== -1) queue.splice(idx, 1);

      } catch (err) {
        console.error('Failed to send message:', err);
        // Revert to queued state on error
        entry.status = 'queued';
        if (el) {
          el.className = 'message message-queued';
          el.onclick = () => unqueueMessage(agentId, entry.id);
        }
      }

      processingQueue.delete(agentId);

      // Process next item if any
      if (queue.some(e => e.status === 'queued')) {
        processQueue(agentId);
      }
    }

    // Tab click handling
    document.getElementById('session-tabs').addEventListener('click', e => {
      if (e.target.classList.contains('close-tab')) {
        const tab = e.target.closest('.session-tab');
        if (tab) closeTab(tab.dataset.id);
        return;
      }
      const tab = e.target.closest('.session-tab');
      if (tab) activateTab(tab.dataset.id);
    });

    // Toggle tool content
    document.getElementById('session-views').addEventListener('click', e => {
      if (e.target.closest('.tool-header')) {
        const tool = e.target.closest('.message-tool');
        const content = tool.querySelector('.tool-content');
        const toggle = tool.querySelector('.tool-toggle');
        content.classList.toggle('collapsed');
        toggle.textContent = content.classList.contains('collapsed') ? '▼' : '▲';
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchAgents(append = false) {
      if (loading) return;
      loading = true;

      const offset = append ? currentOffset : 0;
      // Use 'all' source for status-based tabs
      const apiSource = (statusFilter && sourceFilter === 'all') ? 'all' : sourceFilter;
      const res = await fetch(`${API}/agents?source=${apiSource}&limit=${PAGE_SIZE}&offset=${offset}`);
      const data = await res.json();

      if (append) {
        agents = [...agents, ...(data.agents || [])];
      } else {
        agents = data.agents || [];
        // Clear old elements when refreshing
        agentElements.forEach(el => el.remove());
        agentElements.clear();
      }

      hasMore = data.hasMore || false;
      currentOffset = agents.length;
      loading = false;
      render();
    }

    async function spawnAgent(cwd, prompt, preset) {
      await fetch(`${API}/agents`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cwd, prompt, preset }),
      });
    }

    // Pull-to-refresh
    let touchStartY = 0;
    let isPulling = false;
    document.addEventListener('touchstart', e => {
      if (window.scrollY === 0) {
        touchStartY = e.touches[0].clientY;
        isPulling = true;
      }
    });
    document.addEventListener('touchmove', e => {
      if (!isPulling) return;
      const pullDistance = e.touches[0].clientY - touchStartY;
      const indicator = document.getElementById('pull-indicator');
      if (pullDistance > 50) {
        indicator.classList.add('visible');
        indicator.textContent = pullDistance > 100 ? 'Release to refresh' : 'Pull to refresh...';
      }
    });
    document.addEventListener('touchend', e => {
      if (!isPulling) return;
      const indicator = document.getElementById('pull-indicator');
      if (indicator.classList.contains('visible') && indicator.textContent.includes('Release')) {
        indicator.textContent = 'Refreshing...';
        fetchAgents().then(() => {
          indicator.classList.remove('visible');
        });
      } else {
        indicator.classList.remove('visible');
      }
      isPulling = false;
    });

    // Filter
    document.getElementById('filter').addEventListener('input', e => {
      filterText = e.target.value.toLowerCase();
      render();
    });

    // Tab navigation
    document.getElementById('source-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;

      // Update active state
      document.querySelectorAll('#source-tabs .tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      const source = tab.dataset.source;
      if (source === 'running' || source === 'done') {
        sourceFilter = 'all';
        statusFilter = source;
      } else {
        sourceFilter = source;
        statusFilter = null;
      }
      currentOffset = 0;
      fetchAgents();
    });

    // Infinite scroll
    window.addEventListener('scroll', () => {
      if (loading || !hasMore) return;
      const scrollBottom = window.innerHeight + window.scrollY;
      const docHeight = document.documentElement.scrollHeight;
      if (scrollBottom >= docHeight - 200) {
        fetchAgents(true);
      }
    });

    function getPresetName(caps) {
      if (!caps) return 'unknown';
      if (caps.canSpawn) return 'coordinator';
      if (caps.canMessage?.length > 0) return 'peer';
      if (caps.canDiscover) return 'observer';
      return 'isolated';
    }

    function createAgentElement(agent) {
      const el = document.createElement('div');
      el.className = 'agent';
      el.dataset.id = agent.id;

      el.innerHTML = `
        <div class="agent-header">
          <span class="agent-cwd"></span>
          <span class="badge badge-status"></span>
        </div>
        <div class="agent-prompt"></div>
      `;

      updateAgentElement(el, agent);
      return el;
    }

    function updateAgentElement(el, agent) {
      // Update selection state
      el.classList.toggle('selected', activeTabId === agent.id);

      // Update text content
      el.querySelector('.agent-cwd').textContent = agent.cwd.split('/').pop() || agent.cwd;
      el.querySelector('.agent-prompt').textContent = agent.prompt.slice(0, 60) + (agent.prompt.length > 60 ? '...' : '');

      // Update status badge
      const statusBadge = el.querySelector('.badge-status');
      statusBadge.textContent = agent.status;
      statusBadge.className = `badge badge-status status-${agent.status}`;
    }

    function render() {
      const container = document.getElementById('agents');
      const filtered = agents.filter(a => {
        // Status filter (running/done tabs)
        if (statusFilter === 'running' && a.status !== 'running' && a.status !== 'waiting') return false;
        if (statusFilter === 'done' && a.status !== 'done' && a.status !== 'error') return false;
        // Text filter
        if (filterText && !a.cwd.toLowerCase().includes(filterText) && !a.prompt.toLowerCase().includes(filterText)) return false;
        return true;
      });

      // Handle empty state
      if (filtered.length === 0) {
        agentElements.forEach(el => el.remove());
        agentElements.clear();
        if (!container.querySelector('.empty')) {
          container.innerHTML = agents.length === 0
            ? '<div class="empty">No agents running. Spawn one above.</div>'
            : '<div class="empty">No agents match filter.</div>';
        }
        return;
      }

      // Remove empty message if present
      const emptyEl = container.querySelector('.empty');
      if (emptyEl) emptyEl.remove();

      // Track which IDs are in filtered list
      const filteredIds = new Set(filtered.map(a => a.id));

      // Remove elements not in filtered list
      for (const [id, el] of agentElements) {
        if (!filteredIds.has(id)) {
          el.remove();
          agentElements.delete(id);
        }
      }

      // Update or create elements in order
      let prevEl = null;
      for (const agent of filtered) {
        let el = agentElements.get(agent.id);

        if (el) {
          // Update existing
          updateAgentElement(el, agent);
        } else {
          // Create new
          el = createAgentElement(agent);
          agentElements.set(agent.id, el);
        }

        // Ensure element is in DOM and in correct order
        const inDom = el.parentElement === container;
        const actualPrev = el.previousElementSibling;
        if (!inDom || actualPrev !== prevEl) {
          if (prevEl) {
            prevEl.after(el);
          } else {
            container.prepend(el);
          }
        }

        prevEl = el;
      }
    }

    // Event delegation for agent clicks - open in tab
    document.getElementById('agents').addEventListener('click', e => {
      // Don't open tab when clicking caps select
      if (e.target.classList.contains('caps-select')) return;

      const agentEl = e.target.closest('.agent');
      if (!agentEl) return;

      const id = agentEl.dataset.id;
      const agent = agents.find(a => a.id === id);
      if (agent) {
        openSessionTab(agent);
      }
    });

    // Event delegation for capability changes
    document.getElementById('agents').addEventListener('change', async e => {
      if (!e.target.classList.contains('caps-select')) return;

      const agentEl = e.target.closest('.agent');
      if (!agentEl) return;

      const id = agentEl.dataset.id;
      const preset = e.target.value;

      // Map preset to capabilities
      const presetCaps = {
        isolated: { canDiscover: false, canRead: [], canMessage: [], canSpawn: false, canBeMessaged: [] },
        observer: { canDiscover: true, canRead: ['*'], canMessage: [], canSpawn: false, canBeMessaged: [] },
        peer: { canDiscover: true, canRead: ['*'], canMessage: ['*'], canSpawn: false, canBeMessaged: ['*'] },
        coordinator: { canDiscover: true, canRead: ['*'], canMessage: ['*'], canSpawn: true, canBeMessaged: ['*'] },
      };

      try {
        const res = await fetch(`${API}/agents/${id}/capabilities`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(presetCaps[preset]),
        });

        if (res.ok) {
          // Update local state
          const agent = agents.find(a => a.id === id);
          if (agent) {
            agent.capabilities = presetCaps[preset];
          }
        } else {
          // Revert on failure
          const agent = agents.find(a => a.id === id);
          if (agent) {
            e.target.value = getPresetName(agent.capabilities);
          }
        }
      } catch {
        // Revert on error
        const agent = agents.find(a => a.id === id);
        if (agent) {
          e.target.value = getPresetName(agent.capabilities);
        }
      }
    });

    let wsBackoff = 1000;
    let wsConnected = false;

    function updateWsStatus(connected) {
      wsConnected = connected;
      const indicator = document.getElementById('ws-status');
      if (indicator) {
        indicator.classList.toggle('ws-connected', connected);
        indicator.classList.toggle('ws-disconnected', !connected);
        indicator.title = connected ? 'Connected' : 'Disconnected';
      }
    }

    function connectWS() {
      const ws = new WebSocket(`${API.replace('http', 'ws')}/ws`);

      ws.onopen = () => {
        wsBackoff = 1000; // Reset backoff on successful connect
        updateWsStatus(true);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'spawn') {
          agents.push(data.agent);
          render();
          // Auto-open newly spawned agents
          openSessionTab(data.agent);
        } else if (data.type === 'message') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            // Build message object with tool info if present
            const msg = {
              content: data.content,
              type: data.messageType || 'assistant',
              input: data.input,
              result: data.result,
            };
            agent.messages.push(msg);
            if (data.tokens) agent.tokens = data.tokens;
            if (data.costUsd) agent.costUsd = data.costUsd;

            // Update open session tab
            const messagesEl = document.getElementById(`messages-${data.agentId}`);
            if (messagesEl) {
              messagesEl.innerHTML = formatMessages(agent.messages);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            // Update tab in sidebar too
            const tab = openTabs.get(data.agentId);
            if (tab) {
              tab.agent.messages = agent.messages;
            }
          }
        } else if (data.type === 'tool-result') {
          // Update existing tool message with its result
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            // Find the tool message that matches (search from end, most recent first)
            for (let i = agent.messages.length - 1; i >= 0; i--) {
              const msg = agent.messages[i];
              if (msg.type === 'tool' && !msg.result) {
                msg.result = data.result;
                break;
              }
            }

            // Re-render messages
            const messagesEl = document.getElementById(`messages-${data.agentId}`);
            if (messagesEl) {
              messagesEl.innerHTML = formatMessages(agent.messages);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        } else if (data.type === 'done' || data.type === 'error') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.type === 'done' ? 'done' : 'error';
            // Targeted update
            const el = agentElements.get(data.agentId);
            if (el) {
              const badge = el.querySelector('.badge-status');
              badge.textContent = agent.status;
              badge.className = `badge badge-status status-${agent.status}`;
            }
          }
        } else if (data.type === 'status') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.status;
            // Targeted update
            const el = agentElements.get(data.agentId);
            if (el) {
              const badge = el.querySelector('.badge-status');
              badge.textContent = agent.status;
              badge.className = `badge badge-status status-${agent.status}`;
            }
          }
        } else if (data.type === 'capabilities') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.capabilities = data.capabilities;
            const el = agentElements.get(data.agentId);
            if (el) {
              el.querySelector('.caps-select').value = getPresetName(data.capabilities);
            }
          }
        }
      };

      ws.onclose = () => {
        updateWsStatus(false);
        // Exponential backoff: 1s, 2s, 4s, 8s, 16s, max 30s
        setTimeout(connectWS, wsBackoff);
        wsBackoff = Math.min(wsBackoff * 2, 30000);
      };
    }

    document.getElementById('spawn-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cwd = document.getElementById('cwd').value;
      const prompt = document.getElementById('prompt').value;
      const preset = document.getElementById('preset').value;
      await spawnAgent(cwd, prompt, preset);
      document.getElementById('cwd').value = '';
      document.getElementById('prompt').value = '';
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Don't trigger when typing in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
        if (e.key === 'Escape') e.target.blur();
        return;
      }

      if (e.key === '/' || e.key === 'n') {
        e.preventDefault();
        document.getElementById('prompt').focus();
      } else if (e.key === 'f') {
        e.preventDefault();
        document.getElementById('filter').focus();
      } else if (e.key === 'r') {
        e.preventDefault();
        fetchAgents();
      } else if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key) - 1;
        const filtered = agents.filter(a =>
          !filterText || a.cwd.toLowerCase().includes(filterText) || a.prompt.toLowerCase().includes(filterText)
        );
        if (filtered[idx]) {
          const id = filtered[idx].id;
          if (expandedAgents.has(id)) expandedAgents.delete(id);
          else expandedAgents.add(id);
          render();
        }
      }
    });

    async function fetchRepos() {
      try {
        const res = await fetch(`${API}/repos`);
        const repos = await res.json();
        const datalist = document.getElementById('repos-list');
        datalist.innerHTML = repos.map(r => `<option value="${r}">`).join('');
      } catch {}
    }

    fetchAgents();
    fetchRepos();
    connectWS();

    // Register service worker for PWA
    let swRegistration = null;
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => { swRegistration = reg; updateNotifyButton(); })
        .catch(() => {});

      // Listen for update notifications from SW
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'update-available') {
          // Show a subtle indicator that an update is available
          showUpdateBanner();
        }
      });
    }

    function showUpdateBanner() {
      // Only show once per session
      if (document.getElementById('update-banner')) return;

      const banner = document.createElement('div');
      banner.id = 'update-banner';
      banner.style.cssText = `
        position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
        background: var(--primary); color: white; padding: 0.5rem 1rem;
        border-radius: 8px; font-size: 0.85rem; cursor: pointer; z-index: 1000;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      `;
      banner.textContent = 'Update available - tap to refresh';
      banner.onclick = () => location.reload();
      document.body.appendChild(banner);
    }

    // Push notifications
    async function updateNotifyButton() {
      const btn = document.getElementById('notify-btn');
      if (!('PushManager' in window) || !swRegistration) {
        btn.style.display = 'none';
        return;
      }

      const subscription = await swRegistration.pushManager.getSubscription();
      btn.classList.toggle('enabled', !!subscription);
      btn.textContent = subscription ? 'Notify: On' : 'Notify: Off';
    }

    async function toggleNotifications() {
      if (!swRegistration) return;

      const existing = await swRegistration.pushManager.getSubscription();

      if (existing) {
        // Unsubscribe
        await fetch(`${API}/push/unsubscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(existing.toJSON()),
        });
        await existing.unsubscribe();
      } else {
        // Subscribe
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return;

        const res = await fetch(`${API}/push/vapid-public-key`);
        const { publicKey } = await res.json();

        const subscription = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });

        await fetch(`${API}/push/subscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription.toJSON()),
        });
      }

      updateNotifyButton();
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
    }

    document.getElementById('notify-btn').addEventListener('click', toggleNotifications);
  </script>
</body>
</html>
