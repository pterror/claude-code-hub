<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="description" content="Multi-agent Claude Code orchestration hub. Spawn agents, track status, communicate between agents.">
  <meta property="og:title" content="claude-code-hub">
  <meta property="og:description" content="Multi-agent Claude Code orchestration. Spawn agents to different repos, track from your phone.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="manifest" href="/manifest.json">
  <title>claude-code-hub</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #e8e8ed;
      --fg-muted: #888892;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --primary: rgba(59, 130, 246, 0.8);
      --primary-hover: rgba(59, 130, 246, 0.9);
      --success: rgba(34, 197, 94, 0.8);
      --error: rgba(239, 68, 68, 0.8);
      --warning: rgba(234, 179, 8, 0.8);
      --info: rgba(59, 130, 246, 0.7);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --fg: #1a1a1f;
        --fg-muted: #666670;
        --glass-bg: rgba(0, 0, 0, 0.03);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-hover: rgba(0, 0, 0, 0.06);
        --primary: rgba(37, 99, 235, 0.85);
        --primary-hover: rgba(37, 99, 235, 0.95);
        --success: rgba(22, 163, 74, 0.85);
        --error: rgba(220, 38, 38, 0.85);
        --warning: rgba(202, 138, 4, 0.85);
        --info: rgba(37, 99, 235, 0.75);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .agents {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .agent {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .agent:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    @media (prefers-color-scheme: light) {
      .agent:hover {
        border-color: rgba(0, 0, 0, 0.1);
      }
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .agent-cwd {
      font-size: 0.875rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-badges {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge-status {
      color: white;
    }

    .status-running { background: var(--info); }
    .status-done { background: var(--success); }
    .status-error { background: var(--error); }
    .status-waiting { background: var(--warning); }

    .badge-caps {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .agent-prompt {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .agent-toggle {
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-top: 0.5rem;
      opacity: 0.7;
    }

    .agent.expanded .agent-toggle::after { content: "▲ collapse"; }
    .agent:not(.expanded) .agent-toggle::after { content: "▼ expand"; }

    .agent-messages {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
      font-size: 0.8rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .agent.expanded .agent-messages { display: block; }

    .spawn-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 1rem;
      border-radius: 12px;
    }

    input, select {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--fg);
      font-size: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    input::placeholder {
      color: var(--fg-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    select {
      cursor: pointer;
    }

    button {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .empty {
      color: var(--fg-muted);
      text-align: center;
      padding: 3rem 1rem;
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
    }

    .pull-indicator {
      text-align: center;
      padding: 0.5rem;
      color: var(--fg-muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pull-indicator.visible { opacity: 1; }

    .presets {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .preset-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .preset-btn:hover {
      background: var(--glass-hover);
    }
    .preset-btn.add {
      border-style: dashed;
      color: var(--fg-muted);
    }

    .agent-cost {
      font-size: 0.7rem;
      color: var(--fg-muted);
      margin-left: 0.5rem;
    }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .filter-input {
      flex: 1;
    }

    .source-filter {
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
    }

    .badge-source {
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      color: var(--fg-muted);
      font-style: italic;
    }

    .shortcuts {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--fg-muted);
      opacity: 0.6;
    }
    .shortcuts kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      margin-right: 0.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .header h1 {
      margin-bottom: 0;
    }

    .notify-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .notify-btn.enabled {
      background: var(--success);
      color: white;
      border-color: transparent;
    }
  </style>
</head>
<body>
  <div class="pull-indicator" id="pull-indicator">Pull to refresh...</div>
  <div class="header">
    <h1>claude-code-hub</h1>
    <button class="notify-btn" id="notify-btn" title="Enable push notifications">Notify</button>
  </div>

  <div class="presets" id="presets"></div>

  <div class="filter-row">
    <input type="text" class="filter-input" id="filter" placeholder="Filter agents...">
    <select class="source-filter" id="source-filter">
      <option value="all">All sessions</option>
      <option value="hub">Hub only</option>
      <option value="discovered">Discovered</option>
    </select>
  </div>

  <form class="spawn-form" id="spawn-form">
    <input type="text" id="cwd" placeholder="Working directory (e.g. ~/git/moss)" list="repos-list" required>
    <datalist id="repos-list"></datalist>
    <input type="text" id="prompt" placeholder="What should the agent do?" required>
    <select id="preset">
      <option value="isolated">isolated (no inter-agent comms)</option>
      <option value="observer">observer (can see other agents)</option>
      <option value="peer">peer (can communicate with all)</option>
      <option value="coordinator">coordinator (can spawn agents)</option>
    </select>
    <button type="submit">Spawn Agent</button>
  </form>

  <div class="agents" id="agents">
    <div class="empty">No agents running. Spawn one above.</div>
  </div>

  <div class="shortcuts">
    <kbd>/</kbd> prompt <kbd>f</kbd> filter <kbd>r</kbd> refresh <kbd>1-9</kbd> toggle
  </div>

  <script>
    const API = window.location.origin;
    let agents = [];
    const expandedAgents = new Set();
    let filterText = '';
    let sourceFilter = 'all';
    const agentElements = new Map(); // id -> DOM element

    // Load saved presets from localStorage
    let savedPresets = JSON.parse(localStorage.getItem('hub-presets') || '[]');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchAgents() {
      const res = await fetch(`${API}/agents?source=${sourceFilter}`);
      agents = await res.json();
      render();
    }

    async function spawnAgent(cwd, prompt, preset) {
      await fetch(`${API}/agents`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cwd, prompt, preset }),
      });
    }

    // Pull-to-refresh
    let touchStartY = 0;
    let isPulling = false;
    document.addEventListener('touchstart', e => {
      if (window.scrollY === 0) {
        touchStartY = e.touches[0].clientY;
        isPulling = true;
      }
    });
    document.addEventListener('touchmove', e => {
      if (!isPulling) return;
      const pullDistance = e.touches[0].clientY - touchStartY;
      const indicator = document.getElementById('pull-indicator');
      if (pullDistance > 50) {
        indicator.classList.add('visible');
        indicator.textContent = pullDistance > 100 ? 'Release to refresh' : 'Pull to refresh...';
      }
    });
    document.addEventListener('touchend', e => {
      if (!isPulling) return;
      const indicator = document.getElementById('pull-indicator');
      if (indicator.classList.contains('visible') && indicator.textContent.includes('Release')) {
        indicator.textContent = 'Refreshing...';
        fetchAgents().then(() => {
          indicator.classList.remove('visible');
        });
      } else {
        indicator.classList.remove('visible');
      }
      isPulling = false;
    });

    // Presets
    function renderPresets() {
      const container = document.getElementById('presets');
      container.innerHTML = savedPresets.map((p, i) => `
        <button type="button" class="preset-btn" data-index="${i}" title="${p.cwd}\n${p.prompt}">
          ${escapeHtml(p.name || p.cwd.split('/').pop())}
        </button>
      `).join('') + `<button type="button" class="preset-btn add" id="add-preset">+ Save current</button>`;

      container.querySelectorAll('.preset-btn[data-index]').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = savedPresets[btn.dataset.index];
          document.getElementById('cwd').value = p.cwd;
          document.getElementById('prompt').value = p.prompt;
          document.getElementById('preset').value = p.capability || 'isolated';
        });
      });

      document.getElementById('add-preset')?.addEventListener('click', () => {
        const cwd = document.getElementById('cwd').value;
        const prompt = document.getElementById('prompt').value;
        const capability = document.getElementById('preset').value;
        if (!cwd) return alert('Enter a working directory first');
        const name = window.prompt('Preset name:', cwd.split('/').pop());
        if (name) {
          savedPresets.push({ name, cwd, prompt, capability });
          localStorage.setItem('hub-presets', JSON.stringify(savedPresets));
          renderPresets();
        }
      });
    }

    // Filter
    document.getElementById('filter').addEventListener('input', e => {
      filterText = e.target.value.toLowerCase();
      render();
    });

    document.getElementById('source-filter').addEventListener('change', e => {
      sourceFilter = e.target.value;
      fetchAgents();
    });

    function getPresetName(caps) {
      if (!caps) return 'unknown';
      if (caps.canSpawn) return 'coordinator';
      if (caps.canMessage?.length > 0) return 'peer';
      if (caps.canDiscover) return 'observer';
      return 'isolated';
    }

    function createAgentElement(agent) {
      const el = document.createElement('div');
      el.className = 'agent';
      el.dataset.id = agent.id;

      el.innerHTML = `
        <div class="agent-header">
          <span class="agent-cwd"></span>
          <span class="agent-badges">
            <span class="badge badge-status"></span>
            <span class="badge badge-caps"></span>
            <span class="badge badge-source" style="display:none">discovered</span>
            <span class="agent-cost"></span>
          </span>
        </div>
        <div class="agent-prompt"></div>
        <div class="agent-toggle"></div>
        <div class="agent-messages"></div>
      `;

      updateAgentElement(el, agent);
      return el;
    }

    function updateAgentElement(el, agent) {
      // Update classes
      el.classList.toggle('expanded', expandedAgents.has(agent.id));

      // Update text content (no innerHTML for user data)
      el.querySelector('.agent-cwd').textContent = agent.cwd;
      el.querySelector('.agent-prompt').textContent = agent.prompt;

      // Update status badge
      const statusBadge = el.querySelector('.badge-status');
      statusBadge.textContent = agent.status;
      statusBadge.className = `badge badge-status status-${agent.status}`;

      // Update caps badge
      el.querySelector('.badge-caps').textContent = getPresetName(agent.capabilities);

      // Update source badge
      const sourceBadge = el.querySelector('.badge-source');
      sourceBadge.style.display = agent.source === 'discovered' ? '' : 'none';

      // Update cost
      const costEl = el.querySelector('.agent-cost');
      costEl.textContent = agent.tokens ? `${(agent.tokens/1000).toFixed(1)}k tok` : '';

      // Update messages
      const messagesEl = el.querySelector('.agent-messages');
      messagesEl.textContent = agent.messages.map(m => m.content).join('\n\n');
    }

    function render() {
      const container = document.getElementById('agents');
      const filtered = agents.filter(a =>
        !filterText ||
        a.cwd.toLowerCase().includes(filterText) ||
        a.prompt.toLowerCase().includes(filterText)
      );

      // Handle empty state
      if (filtered.length === 0) {
        agentElements.forEach(el => el.remove());
        agentElements.clear();
        if (!container.querySelector('.empty')) {
          container.innerHTML = agents.length === 0
            ? '<div class="empty">No agents running. Spawn one above.</div>'
            : '<div class="empty">No agents match filter.</div>';
        }
        return;
      }

      // Remove empty message if present
      const emptyEl = container.querySelector('.empty');
      if (emptyEl) emptyEl.remove();

      // Track which IDs are in filtered list
      const filteredIds = new Set(filtered.map(a => a.id));

      // Remove elements not in filtered list
      for (const [id, el] of agentElements) {
        if (!filteredIds.has(id)) {
          el.remove();
          agentElements.delete(id);
        }
      }

      // Update or create elements in order
      let prevEl = null;
      for (const agent of filtered) {
        let el = agentElements.get(agent.id);

        if (el) {
          // Update existing
          updateAgentElement(el, agent);
        } else {
          // Create new
          el = createAgentElement(agent);
          agentElements.set(agent.id, el);
        }

        // Ensure correct order
        const expectedPrev = prevEl;
        const actualPrev = el.previousElementSibling;
        if (actualPrev !== expectedPrev) {
          if (expectedPrev) {
            expectedPrev.after(el);
          } else {
            container.prepend(el);
          }
        }

        prevEl = el;
      }
    }

    // Event delegation for agent clicks
    document.getElementById('agents').addEventListener('click', e => {
      const agentEl = e.target.closest('.agent');
      if (!agentEl) return;

      const id = agentEl.dataset.id;
      if (expandedAgents.has(id)) {
        expandedAgents.delete(id);
        agentEl.classList.remove('expanded');
      } else {
        expandedAgents.add(id);
        agentEl.classList.add('expanded');
      }
    });

    function connectWS() {
      const ws = new WebSocket(`${API.replace('http', 'ws')}/ws`);
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'spawn') {
          agents.push(data.agent);
          expandedAgents.add(data.agent.id);
          render();
        } else if (data.type === 'message') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.messages.push({ content: data.content });
            if (data.tokens) agent.tokens = data.tokens;
            if (data.costUsd) agent.costUsd = data.costUsd;
            // Targeted update instead of full render
            const el = agentElements.get(data.agentId);
            if (el) {
              el.querySelector('.agent-messages').textContent = agent.messages.map(m => m.content).join('\n\n');
              el.querySelector('.agent-cost').textContent = agent.tokens ? `${(agent.tokens/1000).toFixed(1)}k tok` : '';
            }
          }
        } else if (data.type === 'done' || data.type === 'error') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.type === 'done' ? 'done' : 'error';
            // Targeted update
            const el = agentElements.get(data.agentId);
            if (el) {
              const badge = el.querySelector('.badge-status');
              badge.textContent = agent.status;
              badge.className = `badge badge-status status-${agent.status}`;
            }
          }
        } else if (data.type === 'status') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.status;
            // Targeted update
            const el = agentElements.get(data.agentId);
            if (el) {
              const badge = el.querySelector('.badge-status');
              badge.textContent = agent.status;
              badge.className = `badge badge-status status-${agent.status}`;
            }
          }
        }
      };
      ws.onclose = () => setTimeout(connectWS, 1000);
    }

    document.getElementById('spawn-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cwd = document.getElementById('cwd').value;
      const prompt = document.getElementById('prompt').value;
      const preset = document.getElementById('preset').value;
      await spawnAgent(cwd, prompt, preset);
      document.getElementById('cwd').value = '';
      document.getElementById('prompt').value = '';
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Don't trigger when typing in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
        if (e.key === 'Escape') e.target.blur();
        return;
      }

      if (e.key === '/' || e.key === 'n') {
        e.preventDefault();
        document.getElementById('prompt').focus();
      } else if (e.key === 'f') {
        e.preventDefault();
        document.getElementById('filter').focus();
      } else if (e.key === 'r') {
        e.preventDefault();
        fetchAgents();
      } else if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key) - 1;
        const filtered = agents.filter(a =>
          !filterText || a.cwd.toLowerCase().includes(filterText) || a.prompt.toLowerCase().includes(filterText)
        );
        if (filtered[idx]) {
          const id = filtered[idx].id;
          if (expandedAgents.has(id)) expandedAgents.delete(id);
          else expandedAgents.add(id);
          render();
        }
      }
    });

    async function fetchRepos() {
      try {
        const res = await fetch(`${API}/repos`);
        const repos = await res.json();
        const datalist = document.getElementById('repos-list');
        datalist.innerHTML = repos.map(r => `<option value="${r}">`).join('');
      } catch {}
    }

    fetchAgents();
    fetchRepos();
    connectWS();
    renderPresets();

    // Register service worker for PWA
    let swRegistration = null;
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => { swRegistration = reg; updateNotifyButton(); })
        .catch(() => {});
    }

    // Push notifications
    async function updateNotifyButton() {
      const btn = document.getElementById('notify-btn');
      if (!('PushManager' in window) || !swRegistration) {
        btn.style.display = 'none';
        return;
      }

      const subscription = await swRegistration.pushManager.getSubscription();
      btn.classList.toggle('enabled', !!subscription);
      btn.textContent = subscription ? 'Notify: On' : 'Notify: Off';
    }

    async function toggleNotifications() {
      if (!swRegistration) return;

      const existing = await swRegistration.pushManager.getSubscription();

      if (existing) {
        // Unsubscribe
        await fetch(`${API}/push/unsubscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(existing.toJSON()),
        });
        await existing.unsubscribe();
      } else {
        // Subscribe
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return;

        const res = await fetch(`${API}/push/vapid-public-key`);
        const { publicKey } = await res.json();

        const subscription = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });

        await fetch(`${API}/push/subscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription.toJSON()),
        });
      }

      updateNotifyButton();
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
    }

    document.getElementById('notify-btn').addEventListener('click', toggleNotifications);
  </script>
