<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="description" content="Multi-agent Claude Code orchestration hub. Spawn agents, track status, communicate between agents.">
  <meta property="og:title" content="claude-code-hub">
  <meta property="og:description" content="Multi-agent Claude Code orchestration. Spawn agents to different repos, track from your phone.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="manifest" href="/manifest.json">
  <title>claude-code-hub</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #e8e8ed;
      --fg-muted: #888892;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --primary: rgba(59, 130, 246, 0.8);
      --primary-hover: rgba(59, 130, 246, 0.9);
      --success: rgba(34, 197, 94, 0.8);
      --error: rgba(239, 68, 68, 0.8);
      --warning: rgba(234, 179, 8, 0.8);
      --info: rgba(59, 130, 246, 0.7);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --fg: #1a1a1f;
        --fg-muted: #666670;
        --glass-bg: rgba(0, 0, 0, 0.03);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-hover: rgba(0, 0, 0, 0.06);
        --primary: rgba(37, 99, 235, 0.85);
        --primary-hover: rgba(37, 99, 235, 0.95);
        --success: rgba(22, 163, 74, 0.85);
        --error: rgba(220, 38, 38, 0.85);
        --warning: rgba(202, 138, 4, 0.85);
        --info: rgba(37, 99, 235, 0.75);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .agents {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .agent {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .agent:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    @media (prefers-color-scheme: light) {
      .agent:hover {
        border-color: rgba(0, 0, 0, 0.1);
      }
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .agent-cwd {
      font-size: 0.875rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-badges {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge-status {
      color: white;
    }

    .status-running { background: var(--info); }
    .status-done { background: var(--success); }
    .status-error { background: var(--error); }
    .status-waiting { background: var(--warning); }

    .badge-caps {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .caps-select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .caps-select:hover {
      border-color: var(--primary);
    }

    .caps-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .agent-prompt {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .agent-toggle {
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-top: 0.5rem;
      opacity: 0.7;
    }

    .agent.expanded .agent-toggle::after { content: "▲ collapse"; }
    .agent:not(.expanded) .agent-toggle::after { content: "▼ expand"; }

    .agent-messages {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
      font-size: 0.8rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .agent.expanded .agent-messages { display: block; }

    .spawn-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 1rem;
      border-radius: 12px;
    }

    input, select {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--fg);
      font-size: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    input::placeholder {
      color: var(--fg-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    select {
      cursor: pointer;
    }

    button {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .empty {
      color: var(--fg-muted);
      text-align: center;
      padding: 3rem 1rem;
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
    }

    .pull-indicator {
      text-align: center;
      padding: 0.5rem;
      color: var(--fg-muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pull-indicator.visible { opacity: 1; }

    .presets {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .preset-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .preset-btn:hover {
      background: var(--glass-hover);
    }
    .preset-btn.add {
      border-style: dashed;
      color: var(--fg-muted);
    }

    .agent-cost {
      font-size: 0.7rem;
      color: var(--fg-muted);
      margin-left: 0.5rem;
    }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .filter-input {
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 0.25rem;
    }

    .tab {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .tab:hover {
      background: var(--glass-hover);
      color: var(--fg);
    }

    .tab.active {
      background: var(--primary);
      color: white;
    }

    .badge-source {
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      color: var(--fg-muted);
      font-style: italic;
    }

    .shortcuts {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--fg-muted);
      opacity: 0.6;
    }
    .shortcuts kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      margin-right: 0.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .header h1 {
      margin-bottom: 0;
    }

    .notify-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .notify-btn.enabled {
      background: var(--success);
      color: white;
      border-color: transparent;
    }

    .triggers-section {
      margin-bottom: 1rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
    }

    .triggers-header {
      padding: 0.75rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--fg-muted);
    }

    .triggers-header:hover {
      background: var(--glass-hover);
    }

    .triggers-content {
      display: none;
      padding: 0 1rem 1rem;
    }

    .triggers-section.expanded .triggers-content {
      display: block;
    }

    .trigger-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .trigger-item code {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      color: var(--fg-muted);
    }

    .trigger-delete {
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      background: var(--error);
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .trigger-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
    }

    .trigger-form input {
      padding: 0.5rem;
      font-size: 0.85rem;
    }

    .trigger-form button {
      padding: 0.5rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="pull-indicator" id="pull-indicator">Pull to refresh...</div>
  <div class="header">
    <h1>claude-code-hub <span id="ws-status" style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--error); vertical-align: middle; margin-left: 4px;" title="Disconnected"></span></h1>
    <button class="notify-btn" id="notify-btn" title="Enable push notifications">Notify</button>
  </div>

  <div class="presets" id="presets"></div>

  <div class="triggers-section" id="triggers-section">
    <div class="triggers-header" id="triggers-header">
      <span>Webhooks</span>
      <span class="triggers-count"></span>
    </div>
    <div class="triggers-content">
      <div id="triggers-list"></div>
      <form class="trigger-form" id="trigger-form">
        <input type="text" id="trigger-name" placeholder="Trigger name (url-safe)" required>
        <input type="text" id="trigger-cwd" placeholder="Working directory" list="repos-list" required>
        <input type="text" id="trigger-prompt" placeholder="Prompt (use {{payload.field}} for templating)" required>
        <button type="submit">Create Trigger</button>
      </form>
    </div>
  </div>

  <div class="filter-row">
    <input type="text" class="filter-input" id="filter" placeholder="Filter agents...">
    <div class="tabs" id="source-tabs">
      <button class="tab active" data-source="all">All</button>
      <button class="tab" data-source="hub">Hub</button>
      <button class="tab" data-source="running">Running</button>
      <button class="tab" data-source="done">Done</button>
    </div>
  </div>

  <form class="spawn-form" id="spawn-form">
    <input type="text" id="cwd" placeholder="Working directory (e.g. ~/git/moss)" list="repos-list" required>
    <datalist id="repos-list"></datalist>
    <input type="text" id="prompt" placeholder="What should the agent do?" required>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <select id="preset" style="flex: 1;">
        <option value="isolated">isolated (no inter-agent comms)</option>
        <option value="observer">observer (can see other agents)</option>
        <option value="peer">peer (can communicate with all)</option>
        <option value="coordinator">coordinator (can spawn agents)</option>
      </select>
      <label style="font-size: 0.75rem; color: var(--fg-muted); white-space: nowrap;">
        <input type="checkbox" id="remember-preset"> default
      </label>
    </div>
    <button type="submit">Spawn Agent</button>
  </form>

  <div class="agents" id="agents">
    <div class="empty">No agents running. Spawn one above.</div>
  </div>

  <div class="shortcuts">
    <kbd>/</kbd> prompt <kbd>f</kbd> filter <kbd>r</kbd> refresh <kbd>1-9</kbd> toggle
  </div>

  <script>
    const API = window.location.origin;
    let agents = [];
    const expandedAgents = new Set();
    let filterText = '';
    let sourceFilter = 'all';  // API filter: all, hub, discovered
    let statusFilter = null;   // Client filter: running, done, or null for all
    const agentElements = new Map(); // id -> DOM element
    let hasMore = false;
    let loading = false;
    let currentOffset = 0;
    const PAGE_SIZE = 50;

    // Load saved presets from localStorage
    let savedPresets = JSON.parse(localStorage.getItem('hub-presets') || '[]');

    // Load default isolation preset
    const defaultPreset = localStorage.getItem('hub-default-preset') || 'isolated';
    document.getElementById('preset').value = defaultPreset;

    // Save preset as default when checkbox is checked
    document.getElementById('preset').addEventListener('change', e => {
      if (document.getElementById('remember-preset').checked) {
        localStorage.setItem('hub-default-preset', e.target.value);
      }
    });

    // When checkbox is checked, immediately save current preset as default
    document.getElementById('remember-preset').addEventListener('change', e => {
      if (e.target.checked) {
        localStorage.setItem('hub-default-preset', document.getElementById('preset').value);
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchAgents(append = false) {
      if (loading) return;
      loading = true;

      const offset = append ? currentOffset : 0;
      // Use 'all' source for status-based tabs
      const apiSource = (statusFilter && sourceFilter === 'all') ? 'all' : sourceFilter;
      const res = await fetch(`${API}/agents?source=${apiSource}&limit=${PAGE_SIZE}&offset=${offset}`);
      const data = await res.json();

      if (append) {
        agents = [...agents, ...(data.agents || [])];
      } else {
        agents = data.agents || [];
        // Clear old elements when refreshing
        agentElements.forEach(el => el.remove());
        agentElements.clear();
      }

      hasMore = data.hasMore || false;
      currentOffset = agents.length;
      loading = false;
      render();
    }

    async function spawnAgent(cwd, prompt, preset) {
      await fetch(`${API}/agents`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cwd, prompt, preset }),
      });
    }

    // Pull-to-refresh
    let touchStartY = 0;
    let isPulling = false;
    document.addEventListener('touchstart', e => {
      if (window.scrollY === 0) {
        touchStartY = e.touches[0].clientY;
        isPulling = true;
      }
    });
    document.addEventListener('touchmove', e => {
      if (!isPulling) return;
      const pullDistance = e.touches[0].clientY - touchStartY;
      const indicator = document.getElementById('pull-indicator');
      if (pullDistance > 50) {
        indicator.classList.add('visible');
        indicator.textContent = pullDistance > 100 ? 'Release to refresh' : 'Pull to refresh...';
      }
    });
    document.addEventListener('touchend', e => {
      if (!isPulling) return;
      const indicator = document.getElementById('pull-indicator');
      if (indicator.classList.contains('visible') && indicator.textContent.includes('Release')) {
        indicator.textContent = 'Refreshing...';
        fetchAgents().then(() => {
          indicator.classList.remove('visible');
        });
      } else {
        indicator.classList.remove('visible');
      }
      isPulling = false;
    });

    // Presets
    function renderPresets() {
      const container = document.getElementById('presets');
      container.innerHTML = savedPresets.map((p, i) => `
        <button type="button" class="preset-btn" data-index="${i}" title="${p.cwd}\n${p.prompt}">
          ${escapeHtml(p.name || p.cwd.split('/').pop())}
        </button>
      `).join('') + `<button type="button" class="preset-btn add" id="add-preset">+ Save current</button>`;

      container.querySelectorAll('.preset-btn[data-index]').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = savedPresets[btn.dataset.index];
          document.getElementById('cwd').value = p.cwd;
          document.getElementById('prompt').value = p.prompt;
          document.getElementById('preset').value = p.capability || 'isolated';
        });
      });

      document.getElementById('add-preset')?.addEventListener('click', () => {
        const cwd = document.getElementById('cwd').value;
        const prompt = document.getElementById('prompt').value;
        const capability = document.getElementById('preset').value;
        if (!cwd) return alert('Enter a working directory first');
        const name = window.prompt('Preset name:', cwd.split('/').pop());
        if (name) {
          savedPresets.push({ name, cwd, prompt, capability });
          localStorage.setItem('hub-presets', JSON.stringify(savedPresets));
          renderPresets();
        }
      });
    }

    // Filter
    document.getElementById('filter').addEventListener('input', e => {
      filterText = e.target.value.toLowerCase();
      render();
    });

    // Tab navigation
    document.getElementById('source-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;

      // Update active state
      document.querySelectorAll('#source-tabs .tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      const source = tab.dataset.source;
      if (source === 'running' || source === 'done') {
        sourceFilter = 'all';
        statusFilter = source;
      } else {
        sourceFilter = source;
        statusFilter = null;
      }
      currentOffset = 0;
      fetchAgents();
    });

    // Infinite scroll
    window.addEventListener('scroll', () => {
      if (loading || !hasMore) return;
      const scrollBottom = window.innerHeight + window.scrollY;
      const docHeight = document.documentElement.scrollHeight;
      if (scrollBottom >= docHeight - 200) {
        fetchAgents(true);
      }
    });

    function getPresetName(caps) {
      if (!caps) return 'unknown';
      if (caps.canSpawn) return 'coordinator';
      if (caps.canMessage?.length > 0) return 'peer';
      if (caps.canDiscover) return 'observer';
      return 'isolated';
    }

    function createAgentElement(agent) {
      const el = document.createElement('div');
      el.className = 'agent';
      el.dataset.id = agent.id;

      el.innerHTML = `
        <div class="agent-header">
          <span class="agent-cwd"></span>
          <span class="agent-badges">
            <span class="badge badge-status"></span>
            <select class="caps-select">
              <option value="isolated">isolated</option>
              <option value="observer">observer</option>
              <option value="peer">peer</option>
              <option value="coordinator">coordinator</option>
            </select>
            <span class="badge badge-source" style="display:none">discovered</span>
            <span class="agent-cost"></span>
          </span>
        </div>
        <div class="agent-prompt"></div>
        <div class="agent-toggle"></div>
        <div class="agent-messages"></div>
      `;

      updateAgentElement(el, agent);
      return el;
    }

    function updateAgentElement(el, agent) {
      // Update classes
      el.classList.toggle('expanded', expandedAgents.has(agent.id));

      // Update text content (no innerHTML for user data)
      el.querySelector('.agent-cwd').textContent = agent.cwd;
      el.querySelector('.agent-prompt').textContent = agent.prompt;

      // Update status badge
      const statusBadge = el.querySelector('.badge-status');
      statusBadge.textContent = agent.status;
      statusBadge.className = `badge badge-status status-${agent.status}`;

      // Update caps select
      const capsSelect = el.querySelector('.caps-select');
      capsSelect.value = getPresetName(agent.capabilities);
      // Disable for discovered sessions (can't change their capabilities)
      capsSelect.disabled = agent.source === 'discovered';

      // Update source badge
      const sourceBadge = el.querySelector('.badge-source');
      sourceBadge.style.display = agent.source === 'discovered' ? '' : 'none';

      // Update cost
      const costEl = el.querySelector('.agent-cost');
      costEl.textContent = agent.tokens ? `${(agent.tokens/1000).toFixed(1)}k tok` : '';

      // Update messages
      const messagesEl = el.querySelector('.agent-messages');
      messagesEl.textContent = agent.messages.map(m => m.content).join('\n\n');
    }

    function render() {
      const container = document.getElementById('agents');
      const filtered = agents.filter(a => {
        // Status filter (running/done tabs)
        if (statusFilter === 'running' && a.status !== 'running' && a.status !== 'waiting') return false;
        if (statusFilter === 'done' && a.status !== 'done' && a.status !== 'error') return false;
        // Text filter
        if (filterText && !a.cwd.toLowerCase().includes(filterText) && !a.prompt.toLowerCase().includes(filterText)) return false;
        return true;
      });

      // Handle empty state
      if (filtered.length === 0) {
        agentElements.forEach(el => el.remove());
        agentElements.clear();
        if (!container.querySelector('.empty')) {
          container.innerHTML = agents.length === 0
            ? '<div class="empty">No agents running. Spawn one above.</div>'
            : '<div class="empty">No agents match filter.</div>';
        }
        return;
      }

      // Remove empty message if present
      const emptyEl = container.querySelector('.empty');
      if (emptyEl) emptyEl.remove();

      // Track which IDs are in filtered list
      const filteredIds = new Set(filtered.map(a => a.id));

      // Remove elements not in filtered list
      for (const [id, el] of agentElements) {
        if (!filteredIds.has(id)) {
          el.remove();
          agentElements.delete(id);
        }
      }

      // Update or create elements in order
      let prevEl = null;
      for (const agent of filtered) {
        let el = agentElements.get(agent.id);

        if (el) {
          // Update existing
          updateAgentElement(el, agent);
        } else {
          // Create new
          el = createAgentElement(agent);
          agentElements.set(agent.id, el);
        }

        // Ensure element is in DOM and in correct order
        const inDom = el.parentElement === container;
        const actualPrev = el.previousElementSibling;
        if (!inDom || actualPrev !== prevEl) {
          if (prevEl) {
            prevEl.after(el);
          } else {
            container.prepend(el);
          }
        }

        prevEl = el;
      }
    }

    // Event delegation for agent clicks
    document.getElementById('agents').addEventListener('click', async e => {
      // Don't toggle when clicking the caps select
      if (e.target.classList.contains('caps-select')) return;

      const agentEl = e.target.closest('.agent');
      if (!agentEl) return;

      const id = agentEl.dataset.id;
      if (expandedAgents.has(id)) {
        expandedAgents.delete(id);
        agentEl.classList.remove('expanded');
      } else {
        expandedAgents.add(id);
        agentEl.classList.add('expanded');

        // Lazy load messages if empty
        const agent = agents.find(a => a.id === id);
        if (agent && (!agent.messages || agent.messages.length === 0)) {
          const messagesEl = agentEl.querySelector('.agent-messages');
          messagesEl.textContent = 'Loading...';
          try {
            const res = await fetch(`${API}/agents/${id}`);
            if (res.ok) {
              const data = await res.json();
              agent.messages = data.messages || [];
              messagesEl.textContent = agent.messages.map(m => m.content).join('\n\n') || '(no messages)';
            } else {
              messagesEl.textContent = '(failed to load)';
            }
          } catch {
            messagesEl.textContent = '(failed to load)';
          }
        }
      }
    });

    // Event delegation for capability changes
    document.getElementById('agents').addEventListener('change', async e => {
      if (!e.target.classList.contains('caps-select')) return;

      const agentEl = e.target.closest('.agent');
      if (!agentEl) return;

      const id = agentEl.dataset.id;
      const preset = e.target.value;

      // Map preset to capabilities
      const presetCaps = {
        isolated: { canDiscover: false, canRead: [], canMessage: [], canSpawn: false, canBeMessaged: [] },
        observer: { canDiscover: true, canRead: ['*'], canMessage: [], canSpawn: false, canBeMessaged: [] },
        peer: { canDiscover: true, canRead: ['*'], canMessage: ['*'], canSpawn: false, canBeMessaged: ['*'] },
        coordinator: { canDiscover: true, canRead: ['*'], canMessage: ['*'], canSpawn: true, canBeMessaged: ['*'] },
      };

      try {
        const res = await fetch(`${API}/agents/${id}/capabilities`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(presetCaps[preset]),
        });

        if (res.ok) {
          // Update local state
          const agent = agents.find(a => a.id === id);
          if (agent) {
            agent.capabilities = presetCaps[preset];
          }
        } else {
          // Revert on failure
          const agent = agents.find(a => a.id === id);
          if (agent) {
            e.target.value = getPresetName(agent.capabilities);
          }
        }
      } catch {
        // Revert on error
        const agent = agents.find(a => a.id === id);
        if (agent) {
          e.target.value = getPresetName(agent.capabilities);
        }
      }
    });

    let wsBackoff = 1000;
    let wsConnected = false;

    function updateWsStatus(connected) {
      wsConnected = connected;
      const indicator = document.getElementById('ws-status');
      if (indicator) {
        indicator.style.background = connected ? 'var(--success)' : 'var(--error)';
        indicator.title = connected ? 'Connected' : 'Disconnected';
      }
    }

    function connectWS() {
      const ws = new WebSocket(`${API.replace('http', 'ws')}/ws`);

      ws.onopen = () => {
        wsBackoff = 1000; // Reset backoff on successful connect
        updateWsStatus(true);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'spawn') {
          agents.push(data.agent);
          expandedAgents.add(data.agent.id);
          render();
        } else if (data.type === 'message') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.messages.push({ content: data.content });
            if (data.tokens) agent.tokens = data.tokens;
            if (data.costUsd) agent.costUsd = data.costUsd;
            // Targeted update instead of full render
            const el = agentElements.get(data.agentId);
            if (el) {
              el.querySelector('.agent-messages').textContent = agent.messages.map(m => m.content).join('\n\n');
              el.querySelector('.agent-cost').textContent = agent.tokens ? `${(agent.tokens/1000).toFixed(1)}k tok` : '';
            }
          }
        } else if (data.type === 'done' || data.type === 'error') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.type === 'done' ? 'done' : 'error';
            // Targeted update
            const el = agentElements.get(data.agentId);
            if (el) {
              const badge = el.querySelector('.badge-status');
              badge.textContent = agent.status;
              badge.className = `badge badge-status status-${agent.status}`;
            }
          }
        } else if (data.type === 'status') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.status;
            // Targeted update
            const el = agentElements.get(data.agentId);
            if (el) {
              const badge = el.querySelector('.badge-status');
              badge.textContent = agent.status;
              badge.className = `badge badge-status status-${agent.status}`;
            }
          }
        } else if (data.type === 'capabilities') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.capabilities = data.capabilities;
            const el = agentElements.get(data.agentId);
            if (el) {
              el.querySelector('.caps-select').value = getPresetName(data.capabilities);
            }
          }
        }
      };

      ws.onclose = () => {
        updateWsStatus(false);
        // Exponential backoff: 1s, 2s, 4s, 8s, 16s, max 30s
        setTimeout(connectWS, wsBackoff);
        wsBackoff = Math.min(wsBackoff * 2, 30000);
      };
    }

    document.getElementById('spawn-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cwd = document.getElementById('cwd').value;
      const prompt = document.getElementById('prompt').value;
      const preset = document.getElementById('preset').value;
      await spawnAgent(cwd, prompt, preset);
      document.getElementById('cwd').value = '';
      document.getElementById('prompt').value = '';
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Don't trigger when typing in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
        if (e.key === 'Escape') e.target.blur();
        return;
      }

      if (e.key === '/' || e.key === 'n') {
        e.preventDefault();
        document.getElementById('prompt').focus();
      } else if (e.key === 'f') {
        e.preventDefault();
        document.getElementById('filter').focus();
      } else if (e.key === 'r') {
        e.preventDefault();
        fetchAgents();
      } else if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key) - 1;
        const filtered = agents.filter(a =>
          !filterText || a.cwd.toLowerCase().includes(filterText) || a.prompt.toLowerCase().includes(filterText)
        );
        if (filtered[idx]) {
          const id = filtered[idx].id;
          if (expandedAgents.has(id)) expandedAgents.delete(id);
          else expandedAgents.add(id);
          render();
        }
      }
    });

    async function fetchRepos() {
      try {
        const res = await fetch(`${API}/repos`);
        const repos = await res.json();
        const datalist = document.getElementById('repos-list');
        datalist.innerHTML = repos.map(r => `<option value="${r}">`).join('');
      } catch {}
    }

    // Triggers
    let triggers = [];

    async function fetchTriggers() {
      try {
        const res = await fetch(`${API}/triggers`);
        triggers = await res.json();
        renderTriggers();
      } catch {}
    }

    function renderTriggers() {
      const list = document.getElementById('triggers-list');
      const count = document.querySelector('.triggers-count');
      count.textContent = triggers.length ? `(${triggers.length})` : '';

      if (triggers.length === 0) {
        list.innerHTML = '<div style="color: var(--fg-muted); font-size: 0.8rem;">No triggers. Create one to enable webhooks.</div>';
        return;
      }

      list.innerHTML = triggers.map(t => `
        <div class="trigger-item" data-name="${t.name}">
          <div>
            <strong>${t.name}</strong><br>
            <code>POST /hooks/${t.name}</code>
          </div>
          <button class="trigger-delete">Delete</button>
        </div>
      `).join('');

      list.querySelectorAll('.trigger-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const item = btn.closest('.trigger-item');
          const name = item.dataset.name;
          await fetch(`${API}/triggers/${encodeURIComponent(name)}`, { method: 'DELETE' });
          fetchTriggers();
        });
      });
    }

    document.getElementById('triggers-header').addEventListener('click', () => {
      document.getElementById('triggers-section').classList.toggle('expanded');
    });

    document.getElementById('trigger-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('trigger-name').value;
      const cwd = document.getElementById('trigger-cwd').value;
      const prompt = document.getElementById('trigger-prompt').value;

      await fetch(`${API}/triggers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, cwd, prompt, preset: 'isolated' }),
      });

      document.getElementById('trigger-name').value = '';
      document.getElementById('trigger-cwd').value = '';
      document.getElementById('trigger-prompt').value = '';
      fetchTriggers();
    });

    fetchAgents();
    fetchRepos();
    fetchTriggers();
    connectWS();
    renderPresets();

    // Register service worker for PWA
    let swRegistration = null;
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => { swRegistration = reg; updateNotifyButton(); })
        .catch(() => {});

      // Listen for update notifications from SW
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'update-available') {
          // Show a subtle indicator that an update is available
          showUpdateBanner();
        }
      });
    }

    function showUpdateBanner() {
      // Only show once per session
      if (document.getElementById('update-banner')) return;

      const banner = document.createElement('div');
      banner.id = 'update-banner';
      banner.style.cssText = `
        position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
        background: var(--primary); color: white; padding: 0.5rem 1rem;
        border-radius: 8px; font-size: 0.85rem; cursor: pointer; z-index: 1000;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      `;
      banner.textContent = 'Update available - tap to refresh';
      banner.onclick = () => location.reload();
      document.body.appendChild(banner);
    }

    // Push notifications
    async function updateNotifyButton() {
      const btn = document.getElementById('notify-btn');
      if (!('PushManager' in window) || !swRegistration) {
        btn.style.display = 'none';
        return;
      }

      const subscription = await swRegistration.pushManager.getSubscription();
      btn.classList.toggle('enabled', !!subscription);
      btn.textContent = subscription ? 'Notify: On' : 'Notify: Off';
    }

    async function toggleNotifications() {
      if (!swRegistration) return;

      const existing = await swRegistration.pushManager.getSubscription();

      if (existing) {
        // Unsubscribe
        await fetch(`${API}/push/unsubscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(existing.toJSON()),
        });
        await existing.unsubscribe();
      } else {
        // Subscribe
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return;

        const res = await fetch(`${API}/push/vapid-public-key`);
        const { publicKey } = await res.json();

        const subscription = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });

        await fetch(`${API}/push/subscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription.toJSON()),
        });
      }

      updateNotifyButton();
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
    }

    document.getElementById('notify-btn').addEventListener('click', toggleNotifications);
  </script>
</body>
</html>
