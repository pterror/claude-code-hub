<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-code-hub</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #e8e8ed;
      --fg-muted: #888892;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --primary: rgba(59, 130, 246, 0.8);
      --primary-hover: rgba(59, 130, 246, 0.9);
      --success: rgba(34, 197, 94, 0.8);
      --error: rgba(239, 68, 68, 0.8);
      --warning: rgba(234, 179, 8, 0.8);
      --info: rgba(59, 130, 246, 0.7);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --fg: #1a1a1f;
        --fg-muted: #666670;
        --glass-bg: rgba(0, 0, 0, 0.03);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-hover: rgba(0, 0, 0, 0.06);
        --primary: rgba(37, 99, 235, 0.85);
        --primary-hover: rgba(37, 99, 235, 0.95);
        --success: rgba(22, 163, 74, 0.85);
        --error: rgba(220, 38, 38, 0.85);
        --warning: rgba(202, 138, 4, 0.85);
        --info: rgba(37, 99, 235, 0.75);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .agents {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .agent {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .agent:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    @media (prefers-color-scheme: light) {
      .agent:hover {
        border-color: rgba(0, 0, 0, 0.1);
      }
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .agent-cwd {
      font-size: 0.875rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-badges {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge-status {
      color: white;
    }

    .status-running { background: var(--info); }
    .status-done { background: var(--success); }
    .status-error { background: var(--error); }
    .status-waiting { background: var(--warning); }

    .badge-caps {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .agent-prompt {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .agent-toggle {
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-top: 0.5rem;
      opacity: 0.7;
    }

    .agent.expanded .agent-toggle::after { content: "▲ collapse"; }
    .agent:not(.expanded) .agent-toggle::after { content: "▼ expand"; }

    .agent-messages {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
      font-size: 0.8rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .agent.expanded .agent-messages { display: block; }

    .spawn-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 1rem;
      border-radius: 12px;
    }

    input, select {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--fg);
      font-size: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    input::placeholder {
      color: var(--fg-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    select {
      cursor: pointer;
    }

    button {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .empty {
      color: var(--fg-muted);
      text-align: center;
      padding: 3rem 1rem;
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>claude-code-hub</h1>

  <form class="spawn-form" id="spawn-form">
    <input type="text" id="cwd" placeholder="Working directory (e.g. ~/git/moss)" required>
    <input type="text" id="prompt" placeholder="What should the agent do?" required>
    <select id="preset">
      <option value="isolated">isolated (no inter-agent comms)</option>
      <option value="observer">observer (can see other agents)</option>
      <option value="peer">peer (can communicate with all)</option>
      <option value="coordinator">coordinator (can spawn agents)</option>
    </select>
    <button type="submit">Spawn Agent</button>
  </form>

  <div class="agents" id="agents">
    <div class="empty">No agents running. Spawn one above.</div>
  </div>

  <script>
    const API = window.location.origin;
    let agents = [];
    const expandedAgents = new Set();

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchAgents() {
      const res = await fetch(`${API}/agents`);
      agents = await res.json();
      render();
    }

    async function spawnAgent(cwd, prompt, preset) {
      await fetch(`${API}/agents`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cwd, prompt, preset }),
      });
    }

    function getPresetName(caps) {
      if (!caps) return 'unknown';
      if (caps.canSpawn) return 'coordinator';
      if (caps.canMessage?.length > 0) return 'peer';
      if (caps.canDiscover) return 'observer';
      return 'isolated';
    }

    function render() {
      const container = document.getElementById('agents');
      if (agents.length === 0) {
        container.innerHTML = '<div class="empty">No agents running. Spawn one above.</div>';
        return;
      }

      container.innerHTML = agents.map(agent => `
        <div class="agent${expandedAgents.has(agent.id) ? ' expanded' : ''}" data-id="${agent.id}">
          <div class="agent-header">
            <span class="agent-cwd">${agent.cwd}</span>
            <span class="agent-badges">
              <span class="badge badge-status status-${agent.status}">${agent.status}</span>
              <span class="badge badge-caps">${getPresetName(agent.capabilities)}</span>
            </span>
          </div>
          <div class="agent-prompt">${escapeHtml(agent.prompt)}</div>
          <div class="agent-toggle"></div>
          <div class="agent-messages">${agent.messages.map(m => escapeHtml(m.content)).join('\n\n')}</div>
        </div>
      `).join('');

      container.querySelectorAll('.agent').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id;
          if (expandedAgents.has(id)) {
            expandedAgents.delete(id);
          } else {
            expandedAgents.add(id);
          }
          render();
        });
      });
    }

    function connectWS() {
      const ws = new WebSocket(`${API.replace('http', 'ws')}/ws`);
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'spawn') {
          agents.push(data.agent);
          expandedAgents.add(data.agent.id);
          render();
        } else if (data.type === 'message') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.messages.push({ content: data.content });
            render();
          }
        } else if (data.type === 'done' || data.type === 'error') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.type === 'done' ? 'done' : 'error';
            render();
          }
        } else if (data.type === 'status') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.status;
            render();
          }
        }
      };
      ws.onclose = () => setTimeout(connectWS, 1000);
    }

    document.getElementById('spawn-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cwd = document.getElementById('cwd').value;
      const prompt = document.getElementById('prompt').value;
      const preset = document.getElementById('preset').value;
      await spawnAgent(cwd, prompt, preset);
      document.getElementById('cwd').value = '';
      document.getElementById('prompt').value = '';
    });

    fetchAgents();
    connectWS();
  </script>
</body>
</html>
