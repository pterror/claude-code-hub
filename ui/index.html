<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="description" content="Multi-agent Claude Code orchestration hub. Spawn agents, track status, communicate between agents.">
  <meta property="og:title" content="claude-code-hub">
  <meta property="og:description" content="Multi-agent Claude Code orchestration. Spawn agents to different repos, track from your phone.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/highlight-dark.css" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="/highlight-light.css" media="(prefers-color-scheme: light)">
  <script src="/marked.min.js"></script>
  <script src="/highlight.min.js"></script>
  <title>claude-code-hub</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #e8e8ed;
      --fg-muted: #888892;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      --glass-border-dark: rgba(0, 0, 0, 0.2);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --primary: rgba(59, 130, 246, 0.7);
      --primary-hover: rgba(59, 130, 246, 0.8);
      --success: rgba(34, 197, 94, 0.7);
      --error: rgba(239, 68, 68, 0.8);
      --warning: rgba(234, 179, 8, 0.8);
      --info: rgba(59, 130, 246, 0.7);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --fg: #1a1a1f;
        --fg-muted: #666670;
        --glass-bg: rgba(0, 0, 0, 0.03);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-border-light: rgba(255, 255, 255, 0.7);
        --glass-border-dark: rgba(0, 0, 0, 0.1);
        --glass-hover: rgba(0, 0, 0, 0.06);
        --primary: rgba(37, 99, 235, 0.75);
        --primary-hover: rgba(37, 99, 235, 0.85);
        --success: rgba(22, 163, 74, 0.75);
        --error: rgba(220, 38, 38, 0.85);
        --warning: rgba(202, 138, 4, 0.85);
        --info: rgba(37, 99, 235, 0.75);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 500;
    }

    /* Main layout */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .agents {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Main content area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .session-tabs {
      display: flex;
      gap: 0.25rem;
      padding: 0.5rem;
      border-bottom: 1px solid var(--glass-border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    #session-views {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0; /* Important for flex children to shrink */
    }

    .session-tab {
      padding: 0.4rem 0.6rem;
      font-size: 0.75rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-light);
      border-left-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      min-width: 120px;
      max-width: 200px;
    }

    .session-tab .tab-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .session-tab .tab-folder {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-tab .tab-summary {
      font-size: 0.65rem;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-tab.active {
      background: var(--primary);
      border-color: var(--primary-hover);
      color: white;
    }

    .session-tab .close-tab {
      opacity: 0.5;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0.2rem 0.35rem;
      border-radius: 4px;
      margin: -0.1rem -0.2rem -0.1rem 0;
    }

    .session-tab .close-tab:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.2);
    }

    .session-tab:not(.active) .close-tab:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    .session-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
      min-height: 0; /* Important for flex children to shrink */
    }

    .session-view.active {
      display: flex;
    }

    .session-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      min-height: 0; /* Important for flex children to shrink and scroll */
    }

    .session-input {
      padding: 0.75rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 0.5rem;
    }

    .session-input input {
      flex: 1;
    }

    .no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg-muted);
    }

    /* Mobile: stack layout */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        min-width: 100%;
        max-height: 50vh;
        border-right: none;
        border-bottom: 1px solid var(--glass-border);
      }
      .sidebar.collapsed {
        max-height: 48px;
        overflow: hidden;
      }
    }

    /* Message styling in session view */
    .message {
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .message-user {
      background: var(--primary);
      color: white;
      margin-left: 2rem;
    }

    /* Markdown in user messages */
    .message-user p { margin: 0 0 0.5rem 0; }
    .message-user p:last-child { margin-bottom: 0; }
    .message-user code {
      background: rgba(255, 255, 255, 0.2);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }
    .message-user pre {
      background: rgba(0, 0, 0, 0.2);
      padding: 0.5rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.25rem 0;
    }
    .message-user a { color: white; text-decoration: underline; }
    .message-user h1, .message-user h2, .message-user h3 {
      margin: 0.5rem 0 0.25rem 0;
      font-weight: 600;
    }
    .message-user h1 { font-size: 1.1rem; }
    .message-user h2 { font-size: 1rem; }
    .message-user h3 { font-size: 0.9rem; }
    .message-user ul, .message-user ol { margin: 0.25rem 0; padding-left: 1.25rem; }
    .message-user blockquote {
      border-left: 3px solid rgba(255, 255, 255, 0.4);
      margin: 0.25rem 0;
      padding-left: 0.75rem;
      opacity: 0.9;
    }

    .message-queued {
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      border-top-color: var(--glass-border-light);
      border-left-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
      color: var(--fg-muted);
      margin-left: 2rem;
      cursor: pointer;
      position: relative;
    }

    .message-queued:hover {
      background: var(--glass-hover);
    }

    .message-queued::before {
      content: '⏳ Queued';
      font-size: 0.65rem;
      opacity: 0.7;
      display: block;
      margin-bottom: 0.25rem;
    }

    .message-queued:hover::after {
      content: '(click to edit)';
      font-size: 0.65rem;
      opacity: 0.7;
      margin-left: 0.5rem;
    }

    .message-sending {
      background: var(--primary);
      color: white;
      margin-left: 2rem;
      opacity: 0.7;
    }

    .message-sending::before {
      content: '⏳ Sending...';
      font-size: 0.65rem;
      opacity: 0.7;
      display: block;
      margin-bottom: 0.25rem;
    }

    .message-assistant {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-light);
      border-left-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
    }

    /* Markdown styling */
    .message-assistant p {
      margin: 0 0 0.5rem 0;
    }
    .message-assistant p:last-child {
      margin-bottom: 0;
    }
    .message-assistant h1, .message-assistant h2, .message-assistant h3 {
      margin: 0.75rem 0 0.5rem 0;
      font-weight: 600;
    }
    .message-assistant h1 { font-size: 1.1rem; }
    .message-assistant h2 { font-size: 1rem; }
    .message-assistant h3 { font-size: 0.9rem; }
    .message-assistant code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }
    .message-assistant pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .message-assistant pre code {
      background: none;
      padding: 0;
    }
    .message-assistant ul, .message-assistant ol {
      margin: 0.5rem 0;
      padding-left: 1.5rem;
    }
    .message-assistant li {
      margin: 0.25rem 0;
    }
    .message-assistant blockquote {
      border-left: 3px solid var(--fg-muted);
      margin: 0.5rem 0;
      padding-left: 0.75rem;
      color: var(--fg-muted);
    }
    .message-assistant a {
      color: var(--primary);
    }
    .message-assistant table {
      border-collapse: collapse;
      margin: 0.5rem 0;
      font-size: 0.8rem;
    }
    .message-assistant th, .message-assistant td {
      border: 1px solid var(--glass-border);
      padding: 0.25rem 0.5rem;
    }
    .message-assistant th {
      background: rgba(0, 0, 0, 0.2);
    }

    .message-tool {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--info);
      border-top-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }

    /* Tool type colors */
    .tool-read { border-left-color: #10b981; }
    .tool-write, .tool-edit { border-left-color: #f59e0b; }
    .tool-bash { border-left-color: #8b5cf6; }
    .tool-grep, .tool-glob { border-left-color: #06b6d4; }
    .tool-web { border-left-color: #ec4899; }
    .tool-task { border-left-color: #6366f1; }
    .tool-ask { border-left-color: #f472b6; }
    .tool-plan { border-left-color: #a855f7; }
    .tool-taskmgmt { border-left-color: #14b8a6; }
    .tool-todo { border-left-color: #f97316; }

    /* AskUserQuestion UI */
    .ask-question {
      background: rgba(244, 114, 182, 0.1);
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .ask-question:last-child {
      margin-bottom: 0;
    }

    .ask-header {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #f472b6;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .ask-text {
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .ask-options {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .ask-option {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      padding: 0.4rem 0.6rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      border: 1px solid rgba(244, 114, 182, 0.2);
    }

    .ask-option-label {
      font-size: 0.8rem;
      font-weight: 500;
    }

    .ask-option-desc {
      font-size: 0.7rem;
      color: var(--fg-muted);
    }

    .ask-option-selected {
      background: rgba(244, 114, 182, 0.2);
      border-color: #f472b6;
    }

    .ask-answer {
      margin-top: 0.5rem;
      padding: 0.4rem 0.6rem;
      background: rgba(34, 197, 94, 0.15);
      border-radius: 4px;
      font-size: 0.75rem;
      color: var(--success);
    }

    .tool-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 0.25rem 0;
    }

    .tool-name {
      font-weight: 500;
      color: var(--fg);
    }

    .tool-param {
      font-weight: 400;
      color: var(--fg-muted);
      font-size: 0.85em;
      margin-left: 0.25rem;
    }

    .tool-meta {
      font-size: 0.7rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
    }

    .tool-toggle {
      font-size: 0.7rem;
      color: var(--fg-muted);
    }

    .tool-content {
      margin-top: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.75rem;
    }

    /* Plan mode tools (ExitPlanMode) - needs more room for markdown */
    .tool-plan .tool-content {
      max-height: 400px;
    }

    .plan-view {
      font-family: system-ui, -apple-system, sans-serif;
    }

    .plan-status {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .plan-status-accepted {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .plan-status-rejected {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .plan-status-pending {
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
    }

    .plan-body {
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .plan-body h1, .plan-body h2, .plan-body h3 {
      margin: 0.5rem 0 0.25rem 0;
      font-weight: 600;
    }

    .plan-body h1 { font-size: 1rem; }
    .plan-body h2 { font-size: 0.9rem; }
    .plan-body h3 { font-size: 0.85rem; }
    .plan-body p { margin: 0 0 0.4rem 0; }
    .plan-body ul, .plan-body ol { margin: 0.25rem 0; padding-left: 1.25rem; }
    .plan-body code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
    }
    .plan-body pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.5rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.25rem 0;
    }

    .plan-enter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #a855f7;
      font-weight: 500;
    }

    /* TaskCreate / TaskUpdate */
    .taskmgmt-view {
      font-size: 0.8rem;
    }

    .taskmgmt-subject {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .taskmgmt-desc {
      color: var(--fg-muted);
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .taskmgmt-field {
      display: flex;
      gap: 0.35rem;
      font-size: 0.7rem;
      margin-bottom: 0.15rem;
    }

    .taskmgmt-field-label {
      color: var(--fg-muted);
      font-weight: 500;
    }

    /* TodoWrite */
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
      padding: 0.2rem 0;
      font-size: 0.8rem;
    }

    .todo-check {
      flex-shrink: 0;
      font-size: 0.85rem;
      line-height: 1.2;
    }

    .todo-item-completed .todo-text {
      text-decoration: line-through;
      color: var(--fg-muted);
    }

    .todo-item-in_progress .todo-check {
      color: #eab308;
    }

    .todo-item-completed .todo-check {
      color: #22c55e;
    }

    .tool-content.collapsed {
      display: none;
    }

    /* Collapsible turns */
    .turn {
      margin-bottom: 0.5rem;
    }

    .turn-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      color: var(--fg-muted);
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    .turn-header:hover {
      background: var(--glass-hover);
    }

    .turn-toggle {
      font-size: 0.6rem;
      transition: transform 0.15s ease;
    }

    .turn.collapsed .turn-toggle {
      transform: rotate(180deg);
    }

    .turn.collapsed .turn-content {
      display: none;
    }

    .turn-summary {
      opacity: 0.7;
    }

    /* File viewer (Read) */
    .file-viewer {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .file-viewer-header {
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--glass-border);
    }

    .file-viewer-content {
      padding: 0.5rem;
      white-space: pre;
      overflow-x: auto;
      font-family: ui-monospace, monospace;
      line-height: 1.4;
    }

    .line-number {
      display: inline-block;
      width: 3em;
      color: var(--fg-muted);
      text-align: right;
      margin-right: 1em;
      user-select: none;
      opacity: 0.5;
    }

    /* Terminal (Bash) */
    .terminal {
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.4rem 0.6rem;
      background: #16162a;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: #888;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .terminal-prompt {
      color: #10b981;
    }

    .terminal-cmd {
      color: #e8e8ed;
      white-space: pre-wrap;
    }

    .terminal-output {
      padding: 0.5rem;
      color: #ccc;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    .terminal-error {
      color: #f87171;
    }

    /* Edit diff */
    .diff-view {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .diff-header {
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-muted);
    }

    .diff-old {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      padding: 0.25rem 0.5rem;
      border-left: 2px solid #ef4444;
    }

    .diff-new {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      padding: 0.25rem 0.5rem;
      border-left: 2px solid #22c55e;
    }

    .diff-content {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
    }

    /* File list (Glob/Grep) */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .file-list-item {
      padding: 0.25rem 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-muted);
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2px;
    }

    .file-list-item:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    /* Search results (Grep) */
    .grep-match {
      padding: 0.25rem 0.5rem;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2px;
      margin-bottom: 0.25rem;
    }

    .grep-file {
      font-size: 0.7rem;
      color: #06b6d4;
      margin-bottom: 0.125rem;
    }

    .grep-line {
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
    }

    .grep-line-num {
      color: var(--fg-muted);
      margin-right: 0.5rem;
    }

    /* Web fetch */
    .web-result {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .web-url {
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      word-break: break-all;
    }

    .web-url a {
      color: #ec4899;
      text-decoration: none;
    }

    .web-url a:hover {
      text-decoration: underline;
    }

    .web-content {
      padding: 0.5rem;
      font-size: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Task/Agent */
    .task-info {
      background: rgba(99, 102, 241, 0.1);
      border-radius: 4px;
      padding: 0.5rem;
    }

    .task-type {
      font-size: 0.7rem;
      color: #6366f1;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .task-prompt {
      font-size: 0.8rem;
    }

    .task-prompt p:first-child,
    .task-result p:first-child {
      margin-top: 0;
    }

    .task-prompt p:last-child,
    .task-result p:last-child {
      margin-bottom: 0;
    }

    .task-result {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--fg-muted);
    }

    .task-result pre {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 0.5rem;
      overflow-x: auto;
    }

    .task-result code {
      font-size: 0.7rem;
    }

    /* Sidebar agent cards - more compact */
    .agent {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-light);
      border-left-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .agent.selected {
      border-color: var(--primary);
      background: var(--glass-hover);
    }

    .agent:hover {
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    @media (prefers-color-scheme: light) {
      .agent:hover {
        border-color: rgba(0, 0, 0, 0.1);
      }
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .agent-cwd {
      font-size: 0.875rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-badges {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge-status {
      color: white;
    }

    .status-running { background: var(--info); }
    .status-done { background: var(--success); }
    .status-error { background: var(--error); }
    .status-waiting { background: var(--warning); }

    .ws-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      vertical-align: middle;
      margin-left: 4px;
    }
    .ws-connected { background: var(--success); }
    .ws-disconnected { background: var(--error); }

    .badge-caps {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .caps-select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .caps-select:hover {
      border-color: var(--primary);
    }

    .caps-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .agent-prompt {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .agent-toggle {
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-top: 0.5rem;
      opacity: 0.7;
    }

    .agent.expanded .agent-toggle::after { content: "▲ collapse"; }
    .agent:not(.expanded) .agent-toggle::after { content: "▼ expand"; }

    .agent-messages {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
      font-size: 0.8rem;
      color: var(--fg-muted);
      font-family: ui-monospace, monospace;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .agent.expanded .agent-messages { display: block; }

    .spawn-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-light);
      border-left-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
      padding: 1rem;
      border-radius: 12px;
    }

    input, select {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--fg);
      font-size: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    input::placeholder {
      color: var(--fg-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    select {
      cursor: pointer;
    }

    button {
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .empty {
      color: var(--fg-muted);
      text-align: center;
      padding: 3rem 1rem;
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
    }

    .pull-indicator {
      text-align: center;
      padding: 0.5rem;
      color: var(--fg-muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pull-indicator.visible { opacity: 1; }

    .presets {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .preset-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .preset-btn:hover {
      background: var(--glass-hover);
    }
    .preset-btn.add {
      border-style: dashed;
      color: var(--fg-muted);
    }

    .agent-cost {
      font-size: 0.7rem;
      color: var(--fg-muted);
      margin-left: 0.5rem;
    }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .filter-input {
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-light);
      border-left-color: var(--glass-border-light);
      border-bottom-color: var(--glass-border-dark);
      border-right-color: var(--glass-border-dark);
      border-radius: 8px;
      padding: 0.25rem;
    }

    .tab {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .tab:hover {
      background: var(--glass-hover);
      color: var(--fg);
    }

    .tab.active {
      background: var(--primary);
      color: white;
    }

    .badge-source {
      background: var(--glass-bg);
      border: 1px dashed var(--glass-border);
      color: var(--fg-muted);
      font-style: italic;
    }

    .shortcuts {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--fg-muted);
      opacity: 0.6;
    }
    .shortcuts kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      margin-right: 0.25rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .header h1 {
      margin-bottom: 0;
    }

    .notify-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--fg-muted);
    }

    .notify-btn.enabled {
      background: var(--success);
      color: white;
      border-color: transparent;
    }

  </style>
</head>
<body>
  <div class="pull-indicator" id="pull-indicator">Pull to refresh...</div>

  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>hub <span id="ws-status" class="ws-indicator ws-disconnected" title="Disconnected"></span></h1>
        <button class="notify-btn" id="notify-btn" title="Enable push notifications">🔔</button>
      </div>

      <div class="sidebar-content">
        <!-- Spawn form -->
        <form class="spawn-form" id="spawn-form" style="margin-bottom: 0.75rem;">
          <input type="text" id="cwd" placeholder="~/git/project" list="repos-list" required style="font-size: 0.85rem; padding: 0.5rem;">
          <datalist id="repos-list"></datalist>
          <input type="text" id="prompt" placeholder="What should the agent do?" required style="font-size: 0.85rem; padding: 0.5rem;">
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <select id="preset" style="flex: 1; font-size: 0.8rem; padding: 0.4rem;">
              <option value="isolated">isolated</option>
              <option value="observer">observer</option>
              <option value="peer">peer</option>
              <option value="coordinator">coordinator</option>
            </select>
            <button type="submit" style="font-size: 0.8rem; padding: 0.4rem 0.75rem;">Spawn</button>
          </div>
        </form>

        <!-- Filter and tabs -->
        <div class="filter-row" style="margin-bottom: 0.5rem; display: flex; gap: 0.5rem;">
          <input type="text" class="filter-input" id="filter" placeholder="Filter..." style="flex: 1; font-size: 0.85rem; padding: 0.5rem;">
          <select id="project-filter" style="font-size: 0.8rem; padding: 0.4rem; max-width: 120px;">
            <option value="">All projects</option>
          </select>
        </div>
        <div class="tabs" id="source-tabs" style="margin-bottom: 0.75rem;">
          <button class="tab active" data-source="all">All</button>
          <button class="tab" data-source="hub">Hub</button>
          <button class="tab" data-source="running">Running</button>
          <button class="tab" data-source="done">Done</button>
        </div>

        <!-- Agent list -->
        <div class="agents" id="agents">
          <div class="empty" style="padding: 1rem; text-align: center; font-size: 0.85rem;">No sessions</div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <div class="session-tabs" id="session-tabs"></div>

      <div id="session-views">
        <div class="no-session" id="no-session">
          <div style="text-align: center;">
            <div style="font-size: 1.25rem; margin-bottom: 0.5rem;">Select a session</div>
            <div style="font-size: 0.85rem;">Click a session in the sidebar to view it</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
