<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-code-hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .agents { display: flex; flex-direction: column; gap: 0.5rem; }
    .agent {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
    }
    .agent:hover { background: #333; }
    .agent-header { display: flex; justify-content: space-between; align-items: center; }
    .agent-cwd { font-size: 0.875rem; color: #888; font-family: monospace; }
    .agent-status {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .status-running { background: #2563eb; }
    .status-done { background: #16a34a; }
    .status-error { background: #dc2626; }
    .status-waiting { background: #ca8a04; }
    .agent-prompt { margin-top: 0.5rem; font-size: 0.875rem; }
    .agent-messages {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #aaa;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .agent.expanded .agent-messages { display: block; }
    .agent-toggle {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.5rem;
    }
    .agent.expanded .agent-toggle::after { content: "▲ collapse"; }
    .agent:not(.expanded) .agent-toggle::after { content: "▼ expand"; }
    .spawn-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      background: #2a2a2a;
      padding: 1rem;
      border-radius: 8px;
    }
    input, button, select {
      padding: 0.75rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 1rem;
    }
    select { cursor: pointer; }
    .agent-caps {
      font-size: 0.7rem;
      color: #666;
      margin-left: 0.5rem;
      padding: 0.15rem 0.4rem;
      background: #333;
      border-radius: 3px;
    }
    button {
      background: #2563eb;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .empty { color: #666; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <h1>claude-code-hub</h1>

  <form class="spawn-form" id="spawn-form">
    <input type="text" id="cwd" placeholder="Working directory (e.g. ~/git/moss)" required>
    <input type="text" id="prompt" placeholder="What should the agent do?" required>
    <select id="preset">
      <option value="isolated">isolated (no inter-agent comms)</option>
      <option value="observer">observer (can see other agents)</option>
      <option value="peer">peer (can communicate with all)</option>
      <option value="coordinator">coordinator (can spawn agents)</option>
    </select>
    <button type="submit">Spawn Agent</button>
  </form>

  <div class="agents" id="agents">
    <div class="empty">No agents running. Spawn one above.</div>
  </div>

  <script>
    const API = window.location.origin;
    let agents = [];
    const expandedAgents = new Set();

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchAgents() {
      const res = await fetch(`${API}/agents`);
      agents = await res.json();
      render();
    }

    async function spawnAgent(cwd, prompt, preset) {
      await fetch(`${API}/agents`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cwd, prompt, preset }),
      });
    }

    function getPresetName(caps) {
      if (!caps) return 'unknown';
      if (caps.canSpawn) return 'coordinator';
      if (caps.canMessage?.length > 0) return 'peer';
      if (caps.canDiscover) return 'observer';
      return 'isolated';
    }

    function render() {
      const container = document.getElementById('agents');
      if (agents.length === 0) {
        container.innerHTML = '<div class="empty">No agents running. Spawn one above.</div>';
        return;
      }

      container.innerHTML = agents.map(agent => `
        <div class="agent${expandedAgents.has(agent.id) ? ' expanded' : ''}" data-id="${agent.id}">
          <div class="agent-header">
            <span class="agent-cwd">${agent.cwd}</span>
            <span>
              <span class="agent-status status-${agent.status}">${agent.status}</span>
              <span class="agent-caps">${getPresetName(agent.capabilities)}</span>
            </span>
          </div>
          <div class="agent-prompt">${agent.prompt}</div>
          <div class="agent-toggle"></div>
          <div class="agent-messages">${agent.messages.map(m => escapeHtml(m.content)).join('\n\n')}</div>
        </div>
      `).join('');

      // Add click handlers for expand/collapse
      container.querySelectorAll('.agent').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id;
          if (expandedAgents.has(id)) {
            expandedAgents.delete(id);
          } else {
            expandedAgents.add(id);
          }
          render();
        });
      });
    }

    // WebSocket for real-time updates
    function connectWS() {
      const ws = new WebSocket(`${API.replace('http', 'ws')}/ws`);
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'spawn') {
          agents.push(data.agent);
          expandedAgents.add(data.agent.id); // Auto-expand new agents
          render();
        } else if (data.type === 'message') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.messages.push({ content: data.content });
            render();
          }
        } else if (data.type === 'done' || data.type === 'error') {
          const agent = agents.find(a => a.id === data.agentId);
          if (agent) {
            agent.status = data.type === 'done' ? 'done' : 'error';
            render();
          }
        }
      };
      ws.onclose = () => setTimeout(connectWS, 1000);
    }

    document.getElementById('spawn-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cwd = document.getElementById('cwd').value;
      const prompt = document.getElementById('prompt').value;
      const preset = document.getElementById('preset').value;
      await spawnAgent(cwd, prompt, preset);
      document.getElementById('cwd').value = '';
      document.getElementById('prompt').value = '';
    });

    fetchAgents();
    connectWS();
  </script>
</body>
</html>
